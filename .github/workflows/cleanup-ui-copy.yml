name: Cleanup UI copy

on:
  push:
    branches:
      - agent/home-and-collab-visibility

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/home-and-collab-visibility
      - name: Cleanup copy
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          t=p.read_text(encoding='utf-8')
          t=t.replace('AI 활용 리더은','AI 활용 리더는')
          t=t.replace('AI 활용 리더 컷(25개 [가정])까지','TOP 기준 25개까지')
          t=t.replace('"의미 없지만 기분 좋은" 명예 랭킹 · 분기 리셋','인사평가·기여 점수와 연결되지 않는 분기별 활용 현황')
          t=t.replace('— 점수 아님, 그냥 명예','— 업무 활용 기록 기준')
          t=t.replace('— 점수가 아닌 가벼운 참여 기록','— 업무 활용 기록 기준')
          p.write_text(t,encoding='utf-8')
          PY
      - name: Parse all scripts
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          t=Path('index.html').read_text(encoding='utf-8')
          out=Path('/tmp/js-check');out.mkdir(exist_ok=True)
          scripts=re.findall(r'<script[^>]*>(.*?)</script>',t,re.S)
          for i,s in enumerate(scripts):(out/f'{i}.js').write_text(s,encoding='utf-8')
          assert '최근 AI 트렌드 핫 스레드' not in t
          assert '다독왕' not in t
          assert 'AI 활용 리더은' not in t
          assert 'data-tab="collab"' in t
          print('copy and scope checks passed')
          PY
          for f in /tmp/js-check/*.js; do node --check "$f"; done
      - name: Commit cleanup
        run: |
          if git diff --quiet -- index.html; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "AI 활용 리더 문구 마무리"
          git push origin HEAD:agent/home-and-collab-visibility
