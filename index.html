<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAOU AX — AI Playground</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
<style>
/* ============================================================
   DAOU AX 플레이그라운드 — AI 도서관 프로토타입
   단일 HTML / 외부 의존성 없음 / 전부 목업 연출
   ============================================================ */
:root{
  /* ===== 다우오피스(그룹웨어) 톤 — 화이트 배경 + 절제된 DAOU 블루 액센트 =====
     PDF(portal.daou.co.kr / DAOUTECH 로고)에서 확인한 브랜드 블루를 기준색으로 사용 */
  --gw-blue:#1c6fc9;
  --gw-blue-deep:#155aa8;
  --gw-blue-tint:#e9f2fc;
  --gw-navy:#16263a;
  /* 레거시 토큰을 그룹웨어 값으로 리매핑 → 기존 규칙 전부 재사용하면서 스킨만 교체 */
  --paper:#f3f5f8;
  --paper-deep:#eef1f5;
  --card:#ffffff;
  --ink:#1f2733;
  --ink-soft:#5a6472;
  --ink-faint:#8b95a3;
  --line:#e4e8ee;
  --line-soft:#eef1f5;
  --green:#155aa8;        /* 주 액센트 → DAOU 블루 */
  --green-soft:#1c6fc9;
  --green-tint:#e9f2fc;
  --leather:#5a6472;
  --leather-tint:#eef1f5;
  --gold:#c8871f;         /* 뱃지·주의색: 절제된 앰버 */
  --gold-tint:#fbf1dd;
  --red:#d0453a;
  --red-tint:#fce9e7;
  --pf-gemini:#3b6ea5; --pf-gemini-bg:#e8f0f9;
  --pf-copilot:#5b4a9e; --pf-copilot-bg:#edeaf8;
  --pf-claude:#c26a2d; --pf-claude-bg:#faeede;
  --radius:6px;
  --shadow:0 1px 2px rgba(20,40,70,.05);
  --shadow-hover:0 2px 8px rgba(20,40,70,.10);
  --font:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',system-ui,sans-serif;
  --serif:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',system-ui,sans-serif;
  --mono:'Cascadia Code','D2Coding',Consolas,monospace;
  --gnb-h:56px;
  --side-w:222px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15.5px}
body{
  font-family:var(--font);color:var(--ink);background:var(--paper);
  min-height:100vh;line-height:1.6;
}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:1rem}

/* ---------- ① 상단 GNB ---------- */
header.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;height:var(--gnb-h);
  background:#fff;border-bottom:1px solid var(--line);
  box-shadow:0 1px 3px rgba(20,40,70,.04);
}
.topbar-inner{height:100%;padding:0 16px;display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;flex:none}
.brand .logo{font-size:1.3rem;line-height:1}
.brand .t1{font-size:1.02rem;font-weight:800;color:var(--gw-blue);letter-spacing:-.2px;white-space:nowrap}
.brand .t1 b{color:var(--ink);font-weight:800}
.brand .t2{display:none}
/* 중앙 통합 검색바 */
.gnb-search{flex:1;max-width:520px;margin:0 auto;display:flex;align-items:center;gap:8px;
  background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:7px 14px;transition:border-color .15s,background .15s}
.gnb-search:focus-within{background:#fff;border-color:var(--gw-blue);box-shadow:0 0 0 3px var(--gw-blue-tint)}
.gnb-search .ic{font-size:.95rem;color:var(--ink-faint)}
.gnb-search input{flex:1;border:none;outline:none;background:transparent;font-size:.9rem;color:var(--ink)}
.gnb-search input::placeholder{color:var(--ink-faint)}
/* 우측 아이콘 + 프로필/액터 */
.gnb-right{display:flex;align-items:center;gap:3px;margin-left:auto;flex:none}
.gnb-ic{position:relative;width:36px;height:36px;border-radius:4px;background:transparent;border:none;font-size:1.05rem;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.gnb-ic:hover{background:var(--paper-deep);color:var(--ink)}
.gnb-ic.on{background:var(--gw-blue-tint);color:var(--gw-blue)}
.gnb-ic.btn-sim{color:var(--gw-blue)}
.gnb-ic .dot{position:absolute;top:6px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid #fff}
.profile-wrap{position:relative;margin-left:6px}
.profile-btn{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--line);border-radius:4px;padding:3px 12px 3px 4px;transition:background .15s}
.profile-btn:hover{background:var(--paper-deep)}
.profile-btn .av{width:26px;height:26px;border-radius:50%;background:var(--gw-blue-tint);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex:none}
.profile-btn .pinfo{text-align:left;line-height:1.15;white-space:nowrap}
.profile-btn .pn{font-size:.8rem;font-weight:700;color:var(--ink)}
.profile-btn .pr{font-size:.66rem;color:var(--ink-faint)}
.profile-btn .caret{font-size:.6rem;color:var(--ink-faint)}
.actor-menu{position:absolute;right:0;top:calc(100% + 8px);background:#fff;border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow-hover);min-width:236px;display:none;overflow:hidden;z-index:120}
.actor-menu.open{display:block;animation:fadeUp .16s ease}
.actor-menu .amh{font-size:.72rem;color:var(--ink-faint);padding:11px 14px 5px;font-weight:700;letter-spacing:.3px}
.actor-menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;padding:10px 14px;font-size:.88rem;border-top:1px solid var(--line-soft);color:var(--ink)}
.actor-menu button:hover{background:var(--paper-deep)}
.actor-menu button.sel{background:var(--gw-blue-tint);color:var(--gw-blue)}
.actor-menu button .ai{width:28px;height:28px;border-radius:50%;background:var(--paper-deep);display:flex;align-items:center;justify-content:center;flex:none;font-size:1rem}
.actor-menu button.sel .ai{background:#fff}
.actor-menu button b{font-weight:700}
.actor-menu button .ad{font-size:.72rem;color:var(--ink-faint);display:block;font-weight:400}

/* ---------- ② 좌측 사이드바 + 레이아웃 ---------- */
.layout{display:flex;padding-top:var(--gnb-h);min-height:100vh}
aside.sidebar{position:fixed;top:var(--gnb-h);left:0;bottom:0;width:var(--side-w);
  background:#fff;border-right:1px solid var(--line);padding:12px 12px 0;overflow-y:auto;z-index:90;display:flex;flex-direction:column}
.side-label{font-size:.7rem;color:var(--ink-faint);font-weight:700;letter-spacing:.4px;padding:10px 12px 4px}
.side-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  background:none;border:none;padding:10px 12px;border-radius:4px;font-size:.9rem;color:var(--ink-soft);font-weight:600;transition:background .13s,color .13s;margin-bottom:2px}
.side-item:hover{background:var(--paper-deep);color:var(--ink)}
.side-item.active{background:var(--gw-blue-tint);color:var(--gw-blue);box-shadow:inset 3px 0 0 var(--gw-blue);border-radius:0 4px 4px 0}
.side-item .si-ic{font-size:1.05rem;width:22px;text-align:center;flex:none}
.side-sep{height:1px;background:var(--line-soft);margin:10px 6px}
.side-foot{font-size:.72rem;color:var(--ink-faint);padding:12px 8px;line-height:1.55;border-top:1px solid var(--line-soft);margin-top:auto}
.side-foot .warn{color:var(--gold);font-weight:700}
main{flex:1;margin-left:var(--side-w);padding:22px 26px 90px;min-width:0}
@media(max-width:900px){
  aside.sidebar{transform:translateX(-100%);transition:transform .2s;box-shadow:var(--shadow-hover)}
  aside.sidebar.open{transform:none}
  main{margin-left:0}
  .gnb-search{max-width:none}
  .profile-btn .pinfo{display:none}
}
.screen{display:none;animation:fadeUp .32s ease}
.screen.visible{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.section-title{font-family:var(--serif);font-size:1.32rem;font-weight:700;display:flex;align-items:center;gap:10px;margin:34px 0 14px}
.section-title small{font-family:var(--font);font-size:.86rem;color:var(--ink-faint);font-weight:400}
.section-title .more{margin-left:auto;font-family:var(--font);font-size:.88rem;color:var(--green-soft);background:none;border:none}
.section-title .more:hover{text-decoration:underline}

/* ---------- 공용 컴포넌트 ---------- */
.btn{border:none;border-radius:4px;padding:11px 20px;font-size:1rem;font-weight:600;transition:all .18s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn-primary{background:var(--green-soft);color:#fff}
.btn-primary:hover{background:var(--green)}
.btn-secondary{background:var(--card);color:var(--green);border:1.5px solid var(--green-soft)}
.btn-secondary:hover{background:var(--green-tint)}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
.btn-ghost:hover{background:var(--paper-deep)}
.btn-big{padding:15px 30px;font-size:1.12rem;border-radius:4px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:.78rem;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.2px}
.tag.pf-GEMINI{color:var(--pf-gemini);background:var(--pf-gemini-bg)}
.tag.pf-COPILOT{color:var(--pf-copilot);background:var(--pf-copilot-bg)}
.tag.pf-CLAUDE{color:var(--pf-claude);background:var(--pf-claude-bg)}
.pill{font-size:.8rem;padding:3px 10px;border-radius:4px;background:var(--paper-deep);color:var(--ink-soft)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

/* ---------- 홈: 검색/칩 ---------- */
.searchwrap{margin-top:6px}
.searchbar{
  display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--line);border-radius:6px;padding:15px 22px;
  box-shadow:var(--shadow);transition:border-color .2s, box-shadow .2s;
}
.searchbar:focus-within{border-color:var(--green-soft);box-shadow:0 0 0 4px rgba(47,93,80,.1),var(--shadow)}
.searchbar .ic{font-size:1.25rem}
.searchbar input{flex:1;border:none;outline:none;background:transparent;font-size:1.12rem;color:var(--ink)}
.searchbar input::placeholder{color:var(--ink-faint)}
.chips{display:flex;gap:8px;margin:16px 0 4px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);padding:7px 16px;border-radius:4px;font-size:.93rem;transition:all .15s}
.chip:hover{border-color:var(--green-soft);color:var(--green)}
.chip.active{background:var(--green-soft);border-color:var(--green-soft);color:#fff;font-weight:600}

/* ---------- 홈: 카드 ---------- */
.hscroll{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 14px;scrollbar-width:thin}
.hscroll .asset-card{flex:0 0 218px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;margin-top:4px}
.asset-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 16px 14px;cursor:pointer;transition:transform .18s, box-shadow .18s, border-color .18s;
  box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;
}
.asset-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--spine,var(--gw-blue));opacity:.9}
.asset-card:hover{border-color:var(--gw-blue);box-shadow:var(--shadow-hover)}
.asset-card .cover{font-size:1.7rem;line-height:1}
.asset-card h3{font-size:1.04rem;font-weight:700;line-height:1.35}
.asset-card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:.82rem;color:var(--ink-faint)}
.asset-card .review-line{font-size:.86rem;color:var(--ink-soft);border-left:3px solid var(--line);padding-left:8px;font-style:italic;line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.asset-card .foot{display:flex;align-items:center;gap:8px;margin-top:auto;font-size:.82rem;color:var(--ink-soft)}
.badge-new{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:6px}

/* ---------- 홈: 하단 위젯 ---------- */
.home-bottom{display:grid;grid-template-columns:1fr 1.3fr;gap:16px;margin-top:36px}
@media(max-width:820px){.home-bottom{grid-template-columns:1fr}}
.widget{padding:20px 22px}
.widget h4{font-family:var(--serif);font-size:1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.reader-row{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:6px;font-size:.95rem}
.reader-row:hover{background:var(--paper-deep)}
.reader-row .rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex:none}
.reader-row.r1 .rank{background:var(--gold-tint);color:#a07b12;border:1.5px solid var(--gold)}
.reader-row.r2 .rank{background:#eee;color:#777;border:1.5px solid #ccc}
.reader-row.r3 .rank{background:#f6e3d3;color:#a4653a;border:1.5px solid #d8a273}
.reader-row .cnt{margin-left:auto;color:var(--ink-faint);font-size:.85rem}
.widget .note{font-size:.78rem;color:var(--ink-faint);margin-top:10px}
.wish-banner{
  background:var(--gw-blue);color:#eaf3fd;border:none;
  display:flex;flex-direction:column;justify-content:center;gap:10px;cursor:pointer;
  transition:box-shadow .18s;position:relative;overflow:hidden;
}
.wish-banner::after{content:'💡';position:absolute;right:18px;bottom:6px;font-size:4.4rem;opacity:.16}
.wish-banner:hover{box-shadow:var(--shadow-hover)}
.wish-banner .big{font-size:1.3rem;font-weight:800;color:#fff}
.wish-banner .cta{align-self:flex-start;background:#fff;color:var(--gw-blue-deep);font-weight:700;padding:9px 18px;border-radius:4px;border:none;margin-top:4px}
.empty{padding:46px 20px;text-align:center;color:var(--ink-faint);border:1.5px dashed var(--line);border-radius:var(--radius);background:#fafbfd}
.empty .big{font-size:2.2rem;margin-bottom:8px}

/* ---------- 상세 ---------- */
.backlink{background:none;border:none;color:var(--ink-soft);font-size:.95rem;padding:6px 2px;margin-bottom:10px}
.backlink:hover{color:var(--green)}
.detail-head{padding:26px 30px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.detail-head .cover-big{font-size:3.2rem;width:86px;height:86px;background:var(--paper-deep);border-radius:6px;display:flex;align-items:center;justify-content:center;flex:none;border:1px solid var(--line)}
.detail-head h2{font-family:var(--serif);font-size:1.7rem;line-height:1.3}
.detail-head .sub{color:var(--ink-soft);font-size:.95rem;margin-top:6px;display:flex;gap:14px;flex-wrap:wrap}
.detail-head .stats{margin-left:auto;text-align:right;font-size:.9rem;color:var(--ink-soft)}
.detail-head .stats .n{font-size:1.5rem;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums}
.usebadges{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
@media(max-width:760px){.usebadges{grid-template-columns:1fr}}
.usebadge{padding:18px 22px;border-radius:var(--radius);border:1px solid var(--line)}
.usebadge.purpose{background:var(--green-tint);border-color:#cfe0d6}
.usebadge.effect{background:var(--gold-tint);border-color:#ecdcae}
.usebadge .lb{font-size:.82rem;font-weight:800;letter-spacing:.4px;margin-bottom:6px;display:flex;gap:6px;align-items:center}
.usebadge.purpose .lb{color:var(--green-soft)}
.usebadge.effect .lb{color:#a07b12}
.usebadge p{font-size:1.06rem;font-weight:600;line-height:1.5}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-top:28px}
.tabs button{background:none;border:none;padding:12px 20px;font-size:1rem;color:var(--ink-soft);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;font-weight:600}
.tabs button:hover{color:var(--ink)}
.tabs button.active{color:var(--green);border-bottom-color:var(--green-soft)}
.tabpane{padding:22px 4px;display:none}
.tabpane.visible{display:block;animation:fadeUp .25s ease}
.trybox{padding:20px 22px;background:var(--card)}
.trybox .lb{font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.trybox .sample-in{background:var(--paper-deep);border:1px solid var(--line);border-radius:6px;padding:14px 16px;font-size:.94rem;color:var(--ink-soft);white-space:pre-wrap;line-height:1.55}
.trybox .runrow{display:flex;justify-content:center;padding:12px 0}
.try-out{background:var(--gw-navy);color:#dce8f5;border-radius:4px;padding:16px 18px;font-size:.94rem;white-space:pre-wrap;line-height:1.6;display:none;position:relative}
.try-out.visible{display:block;animation:fadeUp .3s ease}
.try-out .cap{position:absolute;top:-9px;left:14px;background:var(--gold);color:#2b2312;font-size:.68rem;font-weight:800;padding:1px 8px;border-radius:4px}
.typing-dots::after{content:'▋';animation:blink 1s steps(2) infinite}
@keyframes blink{50%{opacity:0}}
.adopt-bar{position:sticky;bottom:14px;margin-top:26px;padding:16px 22px;display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.97);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow-hover);z-index:5;flex-wrap:wrap}
.adopt-bar .cnt{color:var(--ink-soft);font-size:.92rem;margin-left:auto;font-variant-numeric:tabular-nums}
.review-item{padding:14px 16px;border-bottom:1px solid var(--line-soft);display:flex;flex-direction:column;gap:6px}
.review-item:last-child{border-bottom:none}
.review-item .txt{font-size:1rem;line-height:1.5}
.review-item .who{font-size:.83rem;color:var(--ink-faint);display:flex;gap:12px;align-items:center}
.review-item .helpful{background:none;border:1px solid var(--line);border-radius:4px;padding:2px 10px;font-size:.78rem;color:var(--ink-soft);transition:all .15s}
.review-item .helpful:hover{border-color:var(--green-soft);color:var(--green)}
.review-write{display:flex;gap:10px;margin:14px 0 6px;flex-wrap:wrap}
.review-write input{flex:1;min-width:200px;border:1.5px solid var(--line);border-radius:6px;padding:11px 14px;background:var(--card)}
.review-write input:focus{outline:none;border-color:var(--green-soft)}
.craft-note{background:var(--card);padding:22px;line-height:1.75;font-size:.98rem}
.craft-note h5{font-size:.85rem;color:var(--ink-faint);letter-spacing:.5px;margin:16px 0 6px;font-weight:800}
.craft-note h5:first-child{margin-top:0}
.tooltag{display:inline-block;background:var(--paper-deep);border:1px solid var(--line);border-radius:4px;padding:3px 10px;font-size:.85rem;margin:2px 4px 2px 0}

/* ---------- 모달 ---------- */
.modal-backdrop{position:fixed;inset:0;background:rgba(30,25,15,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal-backdrop.visible{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:6px;max-width:520px;width:100%;padding:26px 28px;box-shadow:0 12px 40px rgba(20,40,70,.22);animation:popIn .18s ease;max-height:88vh;overflow-y:auto}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(14px)}to{opacity:1;transform:none}}
.modal h3{font-family:var(--serif);font-size:1.3rem;margin-bottom:6px}
.modal .desc{color:var(--ink-soft);font-size:.92rem;margin-bottom:18px}
.formrow{margin-bottom:16px}
.formrow>.lb{font-weight:700;font-size:.94rem;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.formrow .lb .auto{font-size:.72rem;background:var(--green-tint);color:var(--green-soft);padding:2px 8px;border-radius:4px;font-weight:700}
.formrow select,.formrow input[type=text],.formrow textarea{width:100%;border:1.5px solid var(--line);border-radius:6px;padding:11px 13px;background:#fff;font-size:.98rem}
.formrow select:focus,.formrow input:focus,.formrow textarea:focus{outline:none;border-color:var(--green-soft)}
.radio-row{display:flex;gap:10px;flex-wrap:wrap}
.radio-pill{border:1.5px solid var(--line);border-radius:4px;padding:8px 18px;background:#fff;font-size:.94rem;transition:all .15s;color:var(--ink-soft)}
.radio-pill.selected{border-color:var(--green-soft);background:var(--green-tint);color:var(--green);font-weight:700}
.file-pick{border:1.5px dashed var(--line);border-radius:6px;padding:12px;text-align:center;color:var(--ink-faint);font-size:.9rem;cursor:pointer;transition:all .15s;background:#fff}
.file-pick:hover{border-color:var(--green-soft);color:var(--green)}
.file-pick.picked{border-style:solid;border-color:var(--green-soft);color:var(--green);background:var(--green-tint);font-weight:600}
.modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:22px}
/* --- 따라 만들기 (필사) 모달 --- */
.modal.modal-wide{max-width:880px}
.tc-steps{display:flex;gap:6px;margin:6px 0 18px;flex-wrap:wrap}
.tc-step{flex:1;min-width:118px;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;background:var(--paper-deep);border:1.5px solid var(--line);font-size:.85rem;color:var(--ink-faint);transition:all .2s}
.tc-step .no{width:22px;height:22px;border-radius:50%;background:var(--line);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.tc-step.on{border-color:var(--gw-blue);background:var(--gw-blue-tint);color:var(--gw-blue);font-weight:700}
.tc-step.on .no{background:var(--gw-blue)}
.tc-step.done{border-color:var(--green-soft);color:var(--green)}
.tc-step.done .no{background:var(--green-soft)}
.tc-split{display:flex;gap:14px;flex-wrap:wrap}
.tc-col{flex:1;min-width:240px}
.tc-clb{font-size:.82rem;font-weight:700;color:var(--ink-soft);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tc-orig{background:var(--paper-deep);border:1px solid var(--line);border-radius:6px;padding:13px 15px;font-size:.9rem;line-height:1.65;color:var(--ink-soft);white-space:pre-wrap;max-height:300px;overflow-y:auto}
.tc-edit{width:100%;min-height:210px;border:1.5px solid var(--green-soft);border-radius:6px;padding:13px 15px;font-size:.9rem;line-height:1.65;font-family:inherit;resize:vertical;box-sizing:border-box}
.tc-edit:focus{outline:none;border-color:var(--green)}
.tc-hintchips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tc-hint{cursor:pointer;border:1.5px dashed var(--gw-blue);background:var(--gw-blue-tint);color:var(--gw-blue);border-radius:4px;padding:7px 14px;font-size:.86rem;font-weight:600;transition:all .15s}
.tc-hint:hover{background:var(--gw-blue);color:#fff}
.tc-nav{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-top:20px;flex-wrap:wrap}
.draft-tag{font-size:.7rem;font-weight:700;color:var(--gold);background:var(--gold-tint);border-radius:4px;padding:2px 8px;letter-spacing:.2px}
.done-anim{text-align:center;padding:22px 0 6px}
.done-anim .bookfly{font-size:3.4rem;display:inline-block;animation:bookfly .5s ease}
@keyframes bookfly{0%{transform:translateY(46px) scale(.4) rotate(-16deg);opacity:0}60%{transform:translateY(-8px) scale(1.1) rotate(4deg);opacity:1}100%{transform:none}}
.done-anim h3{margin-top:10px}
.done-anim .sub{color:var(--ink-soft);font-size:.94rem;margin-top:6px}

/* ---------- 등록 플로우 ---------- */
.reg-wrap{max-width:720px;margin:0 auto}
.stepdots{display:flex;align-items:center;justify-content:center;gap:0;margin:10px 0 28px}
.stepdots .dot{width:34px;height:34px;border-radius:50%;background:var(--paper-deep);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:var(--ink-faint);transition:all .3s;z-index:1}
.stepdots .dot.on{background:var(--green-soft);border-color:var(--green-soft);color:#fff}
.stepdots .dot.done{background:var(--green-tint);border-color:var(--green-soft);color:var(--green)}
.stepdots .bar{width:80px;height:2.5px;background:var(--line);transition:background .3s}
.stepdots .bar.on{background:var(--green-soft)}
.regcard{padding:30px 34px}
.regcard h3{font-family:var(--serif);font-size:1.35rem;margin-bottom:20px}
.type-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:640px){.type-cards{grid-template-columns:1fr}}
.type-card{border:2px solid var(--line);border-radius:6px;padding:18px 14px;text-align:center;background:#fff;transition:all .18s;cursor:pointer}
.type-card:hover{border-color:var(--gw-blue)}
.type-card.selected{border-color:var(--green-soft);background:var(--green-tint);box-shadow:0 0 0 3px rgba(47,93,80,.12)}
.type-card .ic{font-size:2rem}
.type-card .nm{font-weight:800;margin-top:8px}
.type-card .ds{font-size:.8rem;color:var(--ink-faint);margin-top:4px;line-height:1.4}
.reg-nav{display:flex;justify-content:space-between;margin-top:26px}
.req-star{color:var(--red);font-weight:800}
.hint{font-size:.82rem;color:var(--ink-faint);margin-top:5px}
/* 심사 스테퍼 */
.patent-steps{display:flex;align-items:flex-start;justify-content:center;gap:0;margin:30px 0 6px}
.pstep{display:flex;flex-direction:column;align-items:center;gap:8px;width:130px}
.pstep .circ{width:52px;height:52px;border-radius:50%;background:var(--paper-deep);border:2.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1.35rem;transition:all .4s}
.pstep .nm{font-weight:700;font-size:.94rem;color:var(--ink-faint);transition:color .3s}
.pstep.on .circ{border-color:var(--gold);background:var(--gold-tint);animation:pulse 1.4s ease infinite}
.pstep.on .nm{color:#a07b12}
.pstep.done .circ{border-color:var(--green-soft);background:var(--green-soft);color:#fff}
.pstep.done .nm{color:var(--green)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 5px rgba(201,162,39,.16)}50%{box-shadow:0 0 0 11px rgba(201,162,39,.06)}}
.pbar{width:70px;height:2.5px;background:var(--line);margin-top:25px;transition:background .4s}
.pbar.on{background:var(--green-soft)}
.verify-log{max-width:480px;margin:22px auto 0;background:var(--gw-navy);border-radius:4px;padding:16px 20px;font-family:var(--mono);font-size:.82rem;color:#9db6d6;line-height:1.9;min-height:118px;text-align:left}
.verify-log .ok{color:#6fd39a}
.verify-log .row{opacity:0;animation:fadeUp .4s ease forwards}

/* ---------- 내 자산함 ---------- */
.myshelf-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.myshelf-head h2{font-family:var(--serif);font-size:1.6rem}
.shelfbox{background:linear-gradient(180deg,#6d4a26,#5a3c1e);border-radius:16px;padding:22px 26px 0;box-shadow:inset 0 4px 18px rgba(0,0,0,.35),var(--shadow);margin-top:14px}
.shelf-row{display:flex;align-items:flex-end;gap:7px;min-height:132px;padding:0 6px;position:relative}
.spine{width:34px;height:118px;border-radius:4px 4px 0 0;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform .18s;box-shadow:inset -3px 0 5px rgba(0,0,0,.28), 1px -1px 3px rgba(0,0,0,.3)}
.spine:hover{transform:translateY(-8px)}
.spine .sp-title{writing-mode:vertical-rl;font-size:.68rem;color:rgba(255,252,240,.94);font-weight:700;letter-spacing:.5px;max-height:106px;overflow:hidden;padding:8px 0;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.spine.new-in{animation:spineIn .4s ease}
@keyframes spineIn{0%{transform:translateY(-70px) rotate(-8deg);opacity:0}100%{transform:none;opacity:1}}
.shelf-plank{height:14px;background:linear-gradient(180deg,#4a3012,#35230b);border-radius:3px;margin:0 -12px}
.shelf-caption{color:#d9c9a8;font-size:.83rem;text-align:right;padding:8px 4px 14px}
.borrow-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
.borrow-item:last-child{border-bottom:none}
.borrow-item .nm{font-weight:700;cursor:pointer}
.borrow-item .nm:hover{color:var(--green);text-decoration:underline}
.borrow-item .cfg{font-size:.83rem;color:var(--ink-faint)}
.borrow-item .acts{margin-left:auto;display:flex;gap:8px}
.borrow-item .acts button{font-size:.85rem;padding:7px 14px}
/* 대시보드 */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:14px}
.stat-card{padding:18px 20px;text-align:left}
.stat-card .lb{font-size:.82rem;color:var(--ink-faint);font-weight:700}
.stat-card .val{font-size:1.9rem;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;line-height:1.3}
.stat-card .sub{font-size:.8rem;color:var(--ink-faint)}
.mybook-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
.mybook-row:last-child{border-bottom:none}
.mybook-row .nm{font-weight:700;cursor:pointer}
.mybook-row .nm:hover{color:var(--green);text-decoration:underline}
.mybook-row .st{font-size:.78rem;font-weight:800;padding:3px 10px;border-radius:6px}
.st.published{background:var(--green-tint);color:var(--green)}
.st.review{background:var(--gold-tint);color:#a07b12}
.mybook-row .nums{margin-left:auto;font-size:.85rem;color:var(--ink-soft);font-variant-numeric:tabular-nums}
/* 잔디 */
.grass-wrap{padding:20px 22px;overflow-x:auto}
.grass{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,14px);gap:4px;width:max-content}
.gcell{width:14px;height:14px;border-radius:3px;background:#ece4d0}
.gcell.g1{background:#cfe3d3}.gcell.g2{background:#93c5a4}.gcell.g3{background:#4e9a6f}.gcell.g4{background:#2f6e4c}
.gcell:hover{outline:2px solid var(--gold)}
.grass-legend{display:flex;align-items:center;gap:5px;font-size:.76rem;color:var(--ink-faint);margin-top:10px;justify-content:flex-end}
/* 커밋 로그 */
.commitlog{padding:6px 0;position:relative}
.commit{display:flex;gap:14px;padding:12px 18px;position:relative;align-items:flex-start}
.commit::before{content:'';position:absolute;left:29px;top:0;bottom:0;width:2px;background:var(--line)}
.commit:first-child::before{top:20px}
.commit:last-child::before{bottom:auto;height:20px}
.commit .cdot{width:24px;height:24px;border-radius:50%;background:var(--card);border:2.5px solid var(--green-soft);z-index:1;flex:none;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:.7rem}
.commit.zero .cdot{border-color:var(--ink-faint)}
.commit .cbody{flex:1;min-width:0}
.commit .cmsg{font-weight:600;font-size:.97rem}
.commit .cmeta{font-size:.8rem;color:var(--ink-faint);font-family:var(--mono);margin-top:2px}
.commit .cscore{font-weight:800;font-variant-numeric:tabular-nums;margin-left:auto;flex:none;font-size:.95rem}
.commit .cscore.plus{color:var(--green)}
.commit .cscore.zero{color:var(--ink-faint)}
.ledger-motto{display:inline-flex;align-items:center;gap:8px;background:var(--gold-tint);border:1px solid #ecdcae;color:#8a6d10;font-size:.85rem;font-weight:700;padding:6px 14px;border-radius:4px}
/* 어항 */
.aquarium-wrap{margin-top:14px}
.aquarium{
  position:relative;height:250px;border-radius:18px;overflow:hidden;
  background:linear-gradient(180deg,#8ec8d8 0%,#5ba3bd 40%,#3b7d99 78%,#2e6a84 100%);
  border:6px solid #7a5a34;box-shadow:inset 0 8px 24px rgba(255,255,255,.28), inset 0 -14px 26px rgba(10,40,60,.4), var(--shadow);
}
.aquarium .sand{position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(180deg,#d9c08c,#c4a76e);border-radius:50% 50% 0 0/ 22px 22px 0 0}
.aquarium .weed{position:absolute;bottom:16px;font-size:1.9rem;animation:sway 4s ease-in-out infinite;transform-origin:bottom}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(7deg)}}
.aquarium .bubble{position:absolute;bottom:-12px;width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.42);animation:rise 6s linear infinite}
@keyframes rise{0%{transform:translateY(0) translateX(0);opacity:.7}100%{transform:translateY(-240px) translateX(14px);opacity:0}}
.fish{position:absolute;font-size:1.75rem;animation:swim var(--dur,13s) ease-in-out infinite alternate;left:4%;filter:drop-shadow(0 3px 3px rgba(0,20,40,.3));cursor:default}
.fish .f-inner{display:inline-block;animation:fishflip calc(var(--dur,13s)*2) steps(1) infinite}
@keyframes swim{0%{left:4%}100%{left:82%}}
@keyframes fishflip{0%,49.99%{transform:scaleX(-1)}50%,100%{transform:scaleX(1)}}
.fish.drop-in{animation:swim var(--dur,13s) ease-in-out infinite alternate, splash 1s ease}
@keyframes splash{0%{top:-30px;opacity:0}55%{opacity:1}75%{margin-top:8px}100%{margin-top:0}}
.badge-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:14px}
.badge-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:6px;border:1.5px solid var(--line);background:var(--card);transition:all .2s}
.badge-card .bic{font-size:1.6rem;filter:grayscale(1);opacity:.4}
.badge-card.earned{border-color:#bcd8c6;background:var(--green-tint)}
.badge-card.earned .bic{filter:none;opacity:1}
.badge-card .bnm{font-weight:700;font-size:.9rem}
.badge-card .bds{font-size:.76rem;color:var(--ink-faint)}
.aq-caption{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}

/* ---------- AI 제작 요청 ---------- */
.wish-head{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.wish-head h2{font-family:var(--serif);font-size:1.6rem}
.wish-head .sub{color:var(--ink-soft);font-size:.94rem}
.wish-card{padding:20px 22px;margin-bottom:14px;transition:box-shadow .18s}
.wish-card:hover{box-shadow:var(--shadow-hover)}
.wish-card .q{font-family:var(--serif);font-size:1.14rem;font-weight:700;line-height:1.45}
.wish-card .wmeta{display:flex;gap:14px;align-items:center;margin-top:10px;flex-wrap:wrap;font-size:.87rem;color:var(--ink-soft)}
.vote-btn{border:1.5px solid var(--line);background:#fff;border-radius:4px;padding:6px 14px;font-size:.88rem;color:var(--ink-soft);transition:all .15s;display:inline-flex;gap:6px;align-items:center}
.vote-btn:hover{border-color:var(--green-soft);color:var(--green)}
.vote-btn.voted{border-color:var(--green-soft);background:var(--green-tint);color:var(--green);font-weight:700}
.need-tags{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.need-tag{font-size:.8rem;background:var(--paper-deep);border-radius:4px;padding:4px 10px;color:var(--ink-soft)}
.adopt-menu{position:relative;display:inline-block;margin-left:auto}
.adopt-menu .menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--card);border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow-hover);min-width:250px;display:none;z-index:20;overflow:hidden}
.adopt-menu .menu.open{display:block;animation:fadeUp .18s ease}
.adopt-menu .menu button{display:block;width:100%;text-align:left;background:none;border:none;padding:12px 16px;font-size:.92rem;border-bottom:1px solid var(--line-soft)}
.adopt-menu .menu button:last-child{border-bottom:none}
.adopt-menu .menu button:hover{background:var(--green-tint)}
.adopt-menu .menu .ds{display:block;font-size:.76rem;color:var(--ink-faint)}
.pair-tag{display:inline-flex;align-items:center;gap:6px;background:var(--gold-tint);border:1px solid #ecdcae;border-radius:4px;padding:5px 14px;font-size:.87rem;font-weight:700;color:#8a6d10}
.match-anim{text-align:center;padding:14px 0}
.match-anim .hands{font-size:3.6rem;animation:handshake 1.1s ease;display:inline-block}
@keyframes handshake{0%{transform:scale(.3);opacity:0}55%{transform:scale(1.25)}75%{transform:scale(.95)}100%{transform:scale(1)}}
.match-anim .pairline{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px;font-weight:700;flex-wrap:wrap}
.match-anim .p{background:var(--paper-deep);border-radius:6px;padding:10px 16px}

/* ---------- 관리 콘솔 ---------- */
.console-head{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.console-head h2{font-family:var(--serif);font-size:1.6rem}
.role-toggle{margin-left:auto;display:flex;background:var(--paper-deep);border-radius:6px;padding:4px;border:1px solid var(--line)}
.role-toggle button{border:none;background:transparent;padding:9px 18px;border-radius:4px;font-size:.92rem;font-weight:600;color:var(--ink-soft);transition:all .18s}
.role-toggle button.active{background:var(--green-soft);color:#fff;box-shadow:0 2px 6px rgba(47,93,80,.3)}
.queue-card{padding:20px 22px;margin-bottom:14px}
.queue-card .qhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.queue-card .track{font-size:.74rem;font-weight:800;padding:3px 9px;border-radius:4px;background:var(--red-tint);color:var(--red)}
.queue-card .track.light{background:var(--green-tint);color:var(--green)}
.queue-card h4{font-size:1.08rem}
.precheck{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
.precheck .pc{font-size:.84rem;padding:5px 12px;border-radius:4px;background:var(--green-tint);color:var(--green);font-weight:600}
.precheck .pc.warn{background:var(--gold-tint);color:#a07b12}
.queue-actions{display:flex;gap:10px;flex-wrap:wrap}
.queue-actions .btn{padding:9px 16px;font-size:.92rem}
.approved-stamp{display:inline-flex;align-items:center;gap:8px;color:var(--green);font-weight:800;animation:stampIn .3s ease}
@keyframes stampIn{0%{transform:scale(2.2) rotate(-14deg);opacity:0}100%{transform:none;opacity:1}}
.svc-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line-soft)}
.svc-row:last-child{border-bottom:none}
.dot-ok{width:10px;height:10px;border-radius:50%;background:#3f9d6c;box-shadow:0 0 0 4px rgba(63,157,108,.18);flex:none}
.dot-warn{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(201,162,39,.2);flex:none}
.svc-row .lat{margin-left:auto;font-family:var(--mono);font-size:.83rem;color:var(--ink-faint)}
.barchart{display:flex;align-items:flex-end;gap:10px;height:150px;padding:16px 10px 0}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.barcol .bar{width:100%;max-width:44px;background:var(--gw-blue);border-radius:3px 3px 0 0;transition:height .6s ease;min-height:4px}
.barcol .blb{font-size:.74rem;color:var(--ink-faint)}
.barcol .bval{font-size:.76rem;font-weight:700;color:var(--green)}

/* ---------- X-ray 패널 ---------- */
#xray-panel{
  position:fixed;left:0;right:0;bottom:0;z-index:150;background:var(--gw-navy);color:#9db6d6;
  font-family:var(--mono);font-size:.8rem;border-top:2px solid var(--gw-blue);
  transform:translateY(100%);transition:transform .3s ease;max-height:220px;display:flex;flex-direction:column;
  box-shadow:0 -8px 30px rgba(0,0,0,.3);
}
#xray-panel.visible{transform:none}
#xray-head{display:flex;align-items:center;gap:10px;padding:8px 18px;background:#0f1c2e;font-size:.78rem;color:#7fb3f0;letter-spacing:.5px;flex:none}
#xray-head .live{width:8px;height:8px;border-radius:50%;background:#e05c40;animation:blinkdot 1.2s ease infinite;flex:none}
@keyframes blinkdot{50%{opacity:.25}}
#xray-log{overflow-y:auto;padding:8px 18px 12px;line-height:1.85}
#xray-log .xrow{opacity:0;animation:fadeUp .3s ease forwards;white-space:pre-wrap;word-break:break-all}
#xray-log .xt{color:#5e7d6e;margin-right:8px}
#xray-log .tbl{color:#f0d478;font-weight:700}
#xray-log .arr{color:#7ee2a8}
body.xray-on main{padding-bottom:260px}

/* ---------- 토스트 ---------- */
#toast-root{position:fixed;top:66px;right:22px;z-index:400;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:var(--gw-navy);color:#eef3f9;padding:13px 20px;border-radius:4px;box-shadow:0 8px 26px rgba(20,40,70,.3);font-size:.94rem;display:flex;align-items:center;gap:10px;animation:toastIn .22s ease;max-width:340px;border-left:4px solid var(--gw-blue)}
.toast.score{border-left-color:#6fd39a;background:#123047}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
.toast .big-score{font-size:1.25rem;font-weight:800;color:#7ee2a8}

/* ---------- 시뮬레이션 코치마크 ---------- */
#sim-card{
  position:fixed;right:26px;bottom:26px;z-index:320;width:360px;max-width:calc(100vw - 40px);
  background:var(--gw-navy);color:#eef3f9;border-radius:6px;padding:20px 22px;box-shadow:0 16px 50px rgba(20,40,70,.4);
  border:1px solid #2a466b;display:none;animation:popIn .3s ease;
}
body.xray-on #sim-card{bottom:246px}
#sim-card.visible{display:block}
#sim-card .persona{display:flex;align-items:center;gap:10px;margin-bottom:10px}
#sim-card .avatar{width:40px;height:40px;border-radius:50%;background:var(--gw-blue);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex:none}
#sim-card .pnm{font-weight:800;font-size:.95rem}
#sim-card .prole{font-size:.76rem;color:#9db6d6}
#sim-card .stepnum{font-size:.72rem;color:#7fb3f0;font-weight:800;letter-spacing:1px}
#sim-card .stext{font-size:.95rem;line-height:1.6;margin:6px 0 14px}
#sim-card .sim-actions{display:flex;gap:10px}
#sim-card .sim-actions .next{flex:1;background:var(--gw-blue);color:#fff;font-weight:800;border:none;border-radius:4px;padding:11px}
#sim-card .sim-actions .next:hover{filter:brightness(1.08)}
#sim-card .sim-actions .quit{background:transparent;border:1px solid #2a466b;color:#9db6d6;border-radius:4px;padding:11px 16px}
.sim-highlight{position:relative;z-index:90;outline:3px solid var(--gw-blue)!important;outline-offset:4px;border-radius:4px;animation:hlPulse 1.4s ease infinite}
@keyframes hlPulse{0%,100%{box-shadow:0 0 0 6px rgba(28,111,201,.25)}50%{box-shadow:0 0 0 14px rgba(28,111,201,.05)}}

/* ---------- 푸터 ---------- */
footer{border-top:1px solid var(--line);padding:22px 4px 10px;text-align:center;color:var(--ink-faint);font-size:.82rem;margin-top:36px}
footer .warn{display:inline-flex;align-items:center;gap:8px;background:var(--gold-tint);border:1px solid #ecdcae;color:#8a6d10;padding:6px 16px;border-radius:4px;font-weight:700;margin-bottom:10px}
@media(max-width:700px){
  html{font-size:15px}
  .topbar-inner{padding:0 10px}
  main{padding:18px 14px 90px}
  .detail-head{padding:20px}
  .regcard{padding:22px 18px}
}

/* ============================================================
   [고도화] 내 자산함 리디자인 · 독서 캘린더 · 잔디 · 마일스톤 링 ·
            부서 분포 · 점수 안내 · 오케스트라 · 사서 대시보드
   (파스텔 팝 팔레트는 '나의 서재' 영역에서만 — 다우오피스 톤 유지)
   ============================================================ */
/* ── 1. 모던 책장(MZ) ── */
.mzshelf{margin-top:14px}
.mzshelf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:16px 14px}
.mzbook{cursor:pointer;transition:transform .2s}
.mzbook .cov{position:relative;height:152px;border-radius:6px;padding:13px 13px 12px;color:#fff;
  display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;
  box-shadow:0 6px 15px rgba(20,40,70,.15);transition:box-shadow .2s}
.mzbook .cov::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:rgba(255,255,255,.34)}
.mzbook .cov::after{content:'';position:absolute;right:-30px;bottom:-30px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.14)}
.mzbook .cov .emo{font-size:2.15rem;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));position:relative}
.mzbook .cov .ct{font-size:.83rem;font-weight:800;line-height:1.32;text-shadow:0 1px 3px rgba(0,0,0,.24);position:relative;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.mzbook:hover{transform:translateY(-3px)}
.mzbook:hover .cov{box-shadow:0 15px 30px rgba(20,40,70,.24)}
.mzbook .lbl{margin-top:8px;font-size:.75rem;color:var(--ink-faint);text-align:center;line-height:1.32}
.mzbook.new-in{animation:spineIn .4s ease}
.mzshelf-plank{height:9px;border-radius:3px;background:#dbe7f6;margin:14px 2px 0}
.mzshelf-cap{font-size:.85rem;color:var(--ink-soft);text-align:right;padding:8px 4px 0}
.mzempty{padding:52px 20px;text-align:center;border:1.5px dashed #caddf5;border-radius:6px;background:#f7fafd}
.mzempty .il{font-size:3.6rem;display:block;margin-bottom:6px;animation:bookfly .5s ease}
.mzempty .t{font-size:1.12rem;font-weight:800;color:var(--gw-blue)}
.mzempty .s{color:var(--ink-soft);font-size:.9rem;margin:6px 0 16px}

/* ── 2. 독서 캘린더 ── */
.cal-card{padding:18px 20px;margin-top:14px}
.cal-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cal-head .mtitle{font-weight:800;font-size:1.08rem}
.cal-nav{width:30px;height:30px;border-radius:4px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);font-size:.9rem;flex:none}
.cal-nav:hover:not(:disabled){background:var(--paper-deep);color:var(--gw-blue);border-color:var(--gw-blue)}
.cal-nav:disabled{opacity:.35;cursor:not-allowed}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:.73rem;color:var(--ink-faint);font-weight:700;padding-bottom:2px}
.cal-dow.sun{color:var(--red)}
.cal-cell{min-height:60px;border:1px solid var(--line-soft);border-radius:6px;padding:5px 5px 4px;background:#fff;display:flex;flex-direction:column;gap:3px}
.cal-cell.blank{background:transparent;border:none}
.cal-cell .dnum{font-size:.7rem;color:var(--ink-faint);font-weight:700}
.cal-cell.today{border-color:var(--gw-blue);box-shadow:0 0 0 2px var(--gw-blue-tint)}
.cal-cell.today .dnum{color:var(--gw-blue)}
.cal-chip{display:flex;align-items:center;gap:4px;font-size:.68rem;padding:2px 5px;border-radius:6px;color:#fff;font-weight:700;line-height:1.25;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-chip .ce{font-size:.8rem}
.cal-stars{font-size:.62rem;color:var(--gold);letter-spacing:-1px;line-height:1}
.cal-legend{font-size:.76rem;color:var(--ink-faint);margin-top:10px}

/* ── 3. 잔디(가독화) ── */
.grass-cal{display:flex;gap:6px;align-items:flex-start}
.grass-days{display:grid;grid-template-rows:repeat(7,14px);gap:4px;padding-top:1px}
.grass-days span{font-size:.62rem;color:var(--ink-faint);line-height:14px;height:14px;width:20px;text-align:right}
.grass-weeks{display:flex;justify-content:space-between;font-size:.66rem;color:var(--ink-faint);margin:8px 0 0 26px;max-width:520px}

/* ── 4. 마일스톤 링 ── */
.ms-ring-card{display:flex;align-items:center;gap:22px;padding:18px 24px;margin-top:14px;flex-wrap:wrap}
.ms-ring{position:relative;width:120px;height:120px;flex:none}
.ms-ring svg{transform:rotate(-90deg);display:block}
.ms-ring .track{fill:none;stroke:var(--paper-deep);stroke-width:12}
.ms-ring .prog{fill:none;stroke:var(--gw-blue);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1.05s cubic-bezier(.4,0,.2,1)}
.ms-ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ms-ring .ctr .p{font-size:1.85rem;font-weight:800;color:var(--gw-blue);line-height:1;font-variant-numeric:tabular-nums}
.ms-ring .ctr .u{font-size:.68rem;color:var(--ink-faint);margin-top:2px}
.ms-info{flex:1;min-width:210px}
.ms-info .big{font-size:1.14rem;font-weight:800;line-height:1.4}
.ms-info .sub{color:var(--ink-soft);font-size:.88rem;margin-top:5px;line-height:1.5}
.ms-milestones{display:flex;gap:8px;margin-top:10px}
.ms-flag{font-size:.78rem;font-weight:700;padding:4px 12px;border-radius:4px;background:var(--paper-deep);color:var(--ink-soft)}
.ms-flag.hit{background:var(--green-tint);color:var(--green)}

/* ── 5. 부서별 독자 분포 ── */
.hbars{padding:6px 4px}
.hbar-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.hbar-row .hl{width:88px;font-size:.85rem;color:var(--ink-soft);flex:none;text-align:right}
.hbar-track{flex:1;height:16px;background:var(--paper-deep);border-radius:4px;overflow:hidden}
.hbar-fill{height:100%;background:var(--gw-blue);border-radius:4px;width:0;transition:width .8s cubic-bezier(.4,0,.2,1)}
.hbar-row .hv{width:64px;font-size:.8rem;font-weight:700;color:var(--gw-blue);flex:none;font-variant-numeric:tabular-nums}

/* ── 6. 기여 점수 안내 표 ── */
.score-table{width:100%;border-collapse:collapse;font-size:.9rem;margin-top:4px}
.score-table th,.score-table td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
.score-table th{background:var(--gw-blue-tint);color:var(--gw-blue-deep);font-weight:800;font-size:.82rem}
.score-table td.pts{font-weight:800;text-align:center;white-space:nowrap;font-variant-numeric:tabular-nums}
.score-table td.pts.plus{color:var(--green)}
.score-table td.pts.zero{color:var(--ink-faint)}
.score-table tr.milestone td{background:var(--gold-tint)}
.score-model{margin-top:14px;display:inline-flex;align-items:center;gap:8px;background:var(--gold-tint);border:1px solid #ecdcae;color:#8a6d10;font-size:.85rem;font-weight:700;padding:8px 14px;border-radius:6px;line-height:1.5}

/* ── 7. 오케스트라 ── */
.orch-hero{padding:22px 26px;margin-top:14px;background:#fff;color:var(--ink);border:1px solid var(--line);border-left:3px solid var(--gw-blue);position:relative;overflow:hidden}
.orch-hero::after{content:'🎼';position:absolute;right:20px;bottom:-14px;font-size:5.4rem;opacity:.1}
.orch-hero .line{font-size:1.24rem;font-weight:800;color:var(--ink);line-height:1.5;position:relative;max-width:640px}
.orch-hero .sub{font-size:.9rem;margin-top:8px;color:var(--ink-soft);position:relative}
.orch-case{padding:20px 22px;margin-bottom:14px;cursor:pointer;transition:box-shadow .18s}
.orch-case:hover{box-shadow:var(--shadow-hover)}
.orch-case .ctitle{font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.orch-chain{display:flex;align-items:stretch;overflow-x:auto;padding:2px 2px 12px}
.orch-node{flex:0 0 auto;width:138px;background:var(--paper-deep);border:1px solid var(--line);border-radius:6px;padding:12px 12px;text-align:center}
.orch-node .ic{font-size:1.45rem;line-height:1}
.orch-node .nt{font-size:.82rem;font-weight:800;margin-top:5px}
.orch-node .nd{font-size:.71rem;color:var(--ink-faint);margin-top:4px;line-height:1.35}
.orch-node .np{font-size:.72rem;font-weight:800;color:var(--green);margin-top:4px}
.orch-arrow{flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:var(--gw-blue);font-size:1.15rem;width:26px}
.orch-sum{margin-top:6px;font-weight:800;color:var(--gw-blue-deep);display:flex;align-items:center;gap:8px;font-size:.95rem}
.orch-sum .dept-dots{display:inline-flex;gap:4px}
.orch-sum .dd{width:9px;height:9px;border-radius:50%;background:var(--gw-blue)}

/* ── 8. 사서 대시보드 · 스파크라인 ── */
.spark-card{display:flex;align-items:center;gap:18px;padding:18px 22px;flex-wrap:wrap}
.spark-card .sk-num{font-size:1.9rem;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;line-height:1.1}
.spark-card .sk-lb{font-size:.82rem;color:var(--ink-faint);font-weight:700}
.spark-card .sk-sub{font-size:.8rem;color:var(--ink-faint);margin-top:2px}
.spark-card svg{flex:none}

/* ============================================================
   [HF 패리티 고도화] 합주 모집 보드 · 판권(모델카드) · 전시관(Spaces)
            · 파인튜닝 · 간단히 보기 · 정렬·트렌딩 · 컬렉션 · 부서 인기
   ============================================================ */
/* 정렬 컨트롤 */
.sortbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:4px 0 6px}
.sortbar .sl{font-size:.8rem;color:var(--ink-faint);font-weight:700}
.sort-tab{border:1px solid var(--line);background:#fff;color:var(--ink-soft);padding:6px 13px;border-radius:4px;font-size:.85rem;transition:all .15s}
.sort-tab:hover{border-color:var(--gw-blue);color:var(--gw-blue)}
.sort-tab.active{background:var(--gw-blue);border-color:var(--gw-blue);color:#fff;font-weight:700}
/* 카드 간단히 보기 버튼 */
.asset-card .foot .qv{margin-left:auto;background:var(--paper-deep);border:1px solid var(--line);border-radius:4px;padding:3px 10px;font-size:.76rem;color:var(--ink-soft);flex:none}
.asset-card .foot .qv:hover{border-color:var(--gw-blue);color:var(--gw-blue);background:var(--gw-blue-tint)}
/* 별점 표시(동료 추천도 — 점수·평가 체계와 무관한 표시용 신호) */
.stars{color:var(--gold);letter-spacing:-1px;font-size:.92rem}
.stars .off{color:var(--line)}
/* 퀵뷰 모달 */
.qv-purpose{background:var(--green-tint);border:1px solid #cfe0d6;border-radius:6px;padding:12px 14px;font-size:.96rem;font-weight:600;margin-bottom:10px}
.qv-metaline{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:.88rem;color:var(--ink-soft);margin-bottom:10px}
.qv-try{background:var(--gw-navy);color:#dce8f5;border-radius:4px;padding:11px 14px;font-size:.9rem;line-height:1.55}
/* 판권 정보(모델 카드 / 콜로폰) */
.colophon{padding:18px 20px;margin-top:16px}
.colophon .ct{font-weight:800;font-size:.98rem;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.colophon-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px 18px}
.colophon-grid .k{font-size:.75rem;color:var(--ink-faint);font-weight:700}
.colophon-grid .v{font-size:.92rem;margin-top:2px}
.task-chip{display:inline-flex;align-items:center;font-size:.76rem;font-weight:700;padding:2px 9px;border-radius:6px;background:var(--pf-copilot-bg);color:var(--pf-copilot);margin:2px 4px 2px 0}
.lic-chip{display:inline-flex;align-items:center;gap:5px;font-size:.82rem;font-weight:700;padding:3px 10px;border-radius:4px;background:var(--green-tint);color:var(--green)}
.lic-chip.dept{background:var(--gold-tint);color:#a07b12}
/* 전시관(Spaces) 배포 */
.demo-strip{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 8px}
.demo-card{flex:0 0 220px;border:1px solid var(--line);border-radius:6px;padding:14px 16px;background:#fff;cursor:pointer;transition:border-color .18s}
.demo-card:hover{border-color:var(--gw-blue)}
.demo-card .du{font-family:var(--mono);font-size:.74rem;color:var(--gw-blue);margin-top:6px;word-break:break-all}
.demo-live{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;color:#3f9d6c}
.demo-live::before{content:'';width:7px;height:7px;border-radius:50%;background:#3f9d6c;box-shadow:0 0 0 3px rgba(63,157,108,.18)}
.qr-box{width:118px;height:118px;margin:10px auto;border-radius:6px;background:repeating-linear-gradient(90deg,#16263a 0 9px,#fff 9px 18px),repeating-linear-gradient(0deg,rgba(22,38,58,.55) 0 9px,transparent 9px 18px);border:6px solid #16263a;background-blend-mode:multiply}
.url-pill{font-family:var(--mono);font-size:.92rem;background:var(--paper-deep);border:1px solid var(--line);border-radius:4px;padding:11px 12px;text-align:center;color:var(--gw-blue-deep);word-break:break-all;margin-bottom:4px}
.ext-label{display:inline-flex;align-items:center;gap:6px;background:var(--gold-tint);border:1px solid #ecdcae;color:#8a6d10;font-size:.74rem;font-weight:700;padding:4px 11px;border-radius:4px;white-space:nowrap}
/* 파인튜닝 진행바 */
.ft-progress{height:12px;background:var(--paper-deep);border-radius:4px;overflow:hidden;margin:16px 0 10px}
.ft-bar{height:100%;width:0;background:var(--gw-blue);border-radius:4px;transition:width .35s linear}
.ft-log{font-family:var(--mono);font-size:.8rem;color:var(--ink-soft);line-height:1.85;min-height:72px}
.ft-log .ok{color:var(--green);font-weight:700}
/* 컬렉션(테마 서가) */
.coll-strip{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 12px}
.coll-card{flex:0 0 236px;border-radius:6px;padding:16px 18px;color:#fff;cursor:pointer;position:relative;overflow:hidden;transition:transform .18s;box-shadow:var(--shadow)}
.coll-card:hover{box-shadow:var(--shadow-hover)}
.coll-card .cn{font-weight:800;font-size:1.05rem;position:relative}
.coll-card .cd{font-size:.82rem;margin-top:4px;opacity:.94;position:relative}
.coll-card .cc{font-size:.76rem;margin-top:8px;opacity:.86;position:relative}
.coll-card .emo{position:absolute;right:8px;bottom:-10px;font-size:3.6rem;opacity:.22}
/* 합주 모집 보드 */
.ens-hero{padding:22px 26px;margin:14px 0;background:#fff;color:var(--ink);border:1px solid var(--line);border-left:3px solid #5a3c9e;position:relative;overflow:hidden}
.ens-hero::after{content:'🙋';position:absolute;right:22px;bottom:-10px;font-size:5rem;opacity:.1}
.ens-hero .line{font-size:1.24rem;font-weight:800;color:var(--ink);line-height:1.5;position:relative;max-width:660px}
.ens-hero .sub{font-size:.9rem;margin-top:8px;color:var(--ink-soft);position:relative}
.ens-card{padding:20px 22px;margin-bottom:14px}
.ens-card .eh{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ens-card .et{font-weight:800;font-size:1.06rem}
.ens-card .from{font-size:.76rem;color:var(--ink-faint);background:var(--paper-deep);padding:2px 9px;border-radius:4px}
.ens-prog{display:flex;align-items:center;gap:10px;margin:12px 0}
.ens-track{flex:1;height:14px;background:var(--paper-deep);border-radius:4px;overflow:hidden}
.ens-fill{height:100%;background:#5a3c9e;border-radius:4px}
.ens-pct{font-weight:800;color:#5a3c9e;font-variant-numeric:tabular-nums;font-size:.92rem;flex:none}
.ens-made{font-size:.92rem;color:var(--ink-soft);background:var(--green-tint);border:1px solid #cfe0d6;border-radius:6px;padding:10px 13px;margin-bottom:10px;line-height:1.55}
.ens-made b{color:var(--green)}
.ens-roles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.role-tag{font-size:.82rem;font-weight:700;background:#f3eefc;color:#5a3c9e;border:1px solid #e0d3f5;border-radius:4px;padding:5px 12px}
.ens-foot{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ens-share{font-size:.79rem;color:var(--ink-faint)}
.ens-joined{display:inline-flex;align-items:center;gap:8px;color:#5a3c9e;font-weight:800;animation:stampIn .3s ease}

/* ---------- AX 공식 지식 자산 · AI 실습환경 확장 ---------- */
.ax-hero{background:#fff;border:1px solid var(--line);border-left:3px solid var(--gw-blue);border-radius:6px;padding:24px 26px;margin:12px 0 20px;display:flex;gap:18px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;box-shadow:var(--shadow)}
.ax-hero h2{font-family:var(--serif);font-size:1.55rem;margin-bottom:6px;color:var(--ink)}
.ax-hero p{color:var(--ink-soft);font-size:.96rem;max-width:720px}.ax-hero .quick{display:flex;gap:8px;flex-wrap:wrap}.ax-hero .quick button{font-size:.88rem;padding:8px 14px;border-radius:4px}

/* 화면 → 사이드바 활성 항목 매핑 (기존 nav 라우팅은 그대로 재사용) */
const SIDE_MAP = {home:'side-home', detail:'side-shelf', my:'side-my', register:'side-register', wish:'side-wish', axhub:'side-axhub', practice:'side-practice', guide:'side-guide', radar:'side-radar', orchestra:'side-orchestra', admin:'side-admin', vision:'side-vision'};
function nav(screen, param){
  state.screen = screen;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('visible'));
  const el = document.getElementById('screen-'+screen);
  if(screen==='home') renderHome();
  else if(screen==='detail') renderDetail(param);
  else if(screen==='register') renderRegister();
  else if(screen==='my') renderMy(param);
  else if(screen==='wish') renderWish(param||'OPEN');
  else if(screen==='axhub') renderAxHub();
  else if(screen==='practice') renderPracticeLab();
  else if(screen==='guide') renderCreateGuide();
  else if(screen==='radar') render트렌드();
  else if(screen==='orchestra') renderOrchestra();
  else if(screen==='admin') renderAdmin(state.actor==='dev'?'dev':'plan');
  else if(screen==='vision') renderVision();
  el.classList.add('visible');
  document.querySelectorAll('.side-item').forEach(b=>b.classList.remove('active'));
  const sb = document.getElementById(SIDE_MAP[screen]);
  if(sb) sb.classList.add('active');
  if(XRAY_NAV[screen]) xlog(XRAY_NAV[screen]);
  window.scrollTo({top:0, behavior:'smooth'});
}
/* GNB 통합 검색: 어느 화면에서든 홈으로 이동 후 필터 (기존 homeSearch 재사용) */
function gnbSearch(v){
  if(state.screen!=='home') nav('home');
  homeSearch(v);
}
/* 전체 서가 = 홈의 카테고리·전체 서가 영역으로 포커스 */
function goShelf(){
  nav('home');
  document.querySelectorAll('.side-item').forEach(b=>b.classList.remove('active'));
  const sb=document.getElementById('side-shelf'); if(sb) sb.classList.add('active');

  const toneEl = document.querySelector('#tone-row .radio-pill.selected');
  const tone = toneEl ? toneEl.textContent : '정중체';
  a.adopts++;
  state.myShelf.push({assetId:id, cfg:ME.dept+' · '+tone, date:'오늘'});
  state.ledger.push({d:'오늘', msg:'『'+a.title+'』 — 대출함 (내 서재에 추가)', ev:'ADOPT(소비)', pts:0, ic:'📥'});

}

function regType(k){ state.regDraft.type = k; renderRegister(); }
function regGo(n){
  const d = state.regDraft;
  if(n>=3 && d.step===2){
    d.title=document.getElementById('reg-title').value.trim();
    d.purpose=document.getElementById('reg-purpose').value.trim();
    d.effect=document.getElementById('reg-effect').value.trim();
    d.sIn=document.getElementById('reg-sin').value.trim();
    d.sOut=document.getElementById('reg-sout').value.trim();
    d.craft=document.getElementById('reg-craft').value.trim();
    captureToolFields();
    const be=document.getElementById('reg-base'); if(be) d.baseModel=be.value;
    const de=document.getElementById('reg-data'); if(de) d.dataSource=de.value.trim();
    const se=document.getElementById('reg-sensitive'); if(se) d.sensitive=se.checked;
    const le=document.getElementById('reg-limit'); if(le) d.limitations=le.value.trim();
    if(!d.title || !d.purpose || !d.effect || !d.sIn){
      toast('⛔ 제목·용도·활용효과·예시 입력은 필수예요');
      return;
    }
  }
  d.step = n; renderRegister();
}

function vlogRow(html, delay){
  setTimeout(()=>{
    const v = document.getElementById('vlog'); if(!v) return;
    const r = document.createElement('div'); r.className='row'; r.innerHTML = html;
    v.appendChild(r);
  }, delay);
}
function submitReg(){
  const d = state.regDraft;
  const heavy = d.type==='auto' || d.type==='space' || d.tool==='artifact' || d.tool==='webapp' || d.sensitive;   /* [고도화 2] 민감정보 신고 시 중(重) 트랙 강제 */
  d.step = 4; renderRegister();
  document.getElementById('ps1').classList.add('on');
  xlog('<span class="tbl">ASSET</span> insert (status=SUBMITTED) — <b>출원</b> · 필수 필드 NOT NULL 통과 · 모델카드(기반='+esc(d.baseModel)+', 공개='+esc(d.license)+')');
  if(d.sensitive) xlog('<span class="tbl">ASSET</span>.data_sensitive=<b>true</b> — 민감정보 신고 감지 <span class="arr">→</span> 위험도 라우팅 강제 <b>중(重) 트랙</b> (개인정보 인접 · pii_adjacent_check)');
  vlogRow('▸ 금칙어·개인정보 패턴 스캔 ......... <span class="ok">통과</span>', 500);
  vlogRow('▸ 용도·활용효과 기재 확인 (NOT NULL) ......... <span class="ok">통과</span>', 1100);
  vlogRow('▸ 미리 체험 예시 1건 확인 (쓸모 확인) ......... <span class="ok">통과</span>', 1700);
  setTimeout(()=>{

    document.getElementById('ps2').classList.add('on');

  if(heavy){
    vlogRow('▸ 위험도 라우팅 → <b>중(重) 트랙</b> — 코드 실행 가능성 감지', 2300);
    vlogRow('▸ 사서(AX기획팀) 수동 심사 큐에 적재 ......... <span style="color:#f0d478">대기</span>', 2900);
    setTimeout(()=>{
      xlog('<span class="tbl">REVIEW_CASE</span> insert (track=HEAVY, status=OPEN) <span class="arr">→</span> 사서 콘솔 심사 큐 노출 <span class="arr">→</span> 결과는 알림으로');
      REVIEW_QUEUE.push({
        id:'RC-'+(1045+REVIEW_QUEUE.length), title:d.title, author:ME.name+'('+ME.dept+')',
        track:'HEAVY',
        reason:(d.sensitive?'개인정보 인접 데이터':(d.type==='space'||d.tool==='artifact'||d.tool==='webapp'?'웹앱·실행형 자산':'자동화·커넥터 유형')),
        pre:{purpose:true, effect:true, sample:true}, status:'OPEN',
        assetType:d.type, tool:d.tool, requiresTech:(d.type==='space'||d.type==='auto'||d.tool==='artifact'||d.tool==='webapp'),
        draft:{title:d.title,purpose:d.purpose,effect:d.effect,pf:d.pf,baseModel:d.baseModel,license:d.license,toolFields:d.toolFields}
      });
      document.getElementById('reg-done-actions').innerHTML =
        '<div style="font-weight:700;margin-bottom:12px">🔍 수동 심사 대기 중 — 통과되면 그때 +3점이 적립됩니다</div>'
        + '<button class="btn btn-secondary" onclick="state.regDraft={};nav(\'my\')">나의 서재에서 상태 보기</button>';
      toast('📨 출원 완료 — 중(重) 트랙은 사서의 수동 심사를 거칩니다');
    }, 3400);
    return;
  }
  vlogRow('▸ 위험도 라우팅 → <b>경(輕) 트랙</b> (룰 기반 자동 심사 — 정책이 심사)', 2300);
  vlogRow('▸ 거버넌스 승인 기준 집행 ......... <span class="ok">통과</span>', 2900);
  setTimeout(()=>{
    document.getElementById('ps2').classList.remove('on'); document.getElementById('ps2').classList.add('done');
    document.getElementById('pb2').classList.add('on');
    document.getElementById('ps3').classList.add('done');
    const newId = ASSETS.length + 1;
    ASSETS.push({id:newId, icon:'📗', title:d.title, author:ME.name, dept:ME.dept, pf:d.pf, cat:'문서작성',
      adopts:0, tries:0, recipes:0, daysAgo:0, purpose:d.purpose, effect:d.effect,
      review1:'따끈따끈한 신간이에요', reviews:[], sampleIn:d.sIn, sampleOut:d.sOut||'(예시 출력)',
      craft:d.craft||'(제작 노트 미작성)', tools:[PF[d.pf].label], tags:(d.taskTags||[]).slice(),
      baseModel:d.baseModel, dataSource:d.dataSource||'사내 문서(비공개)', sensitive:d.sensitive,
      taskTags:(d.taskTags||[]).slice(), license:d.license||'전사 공개', limitations:d.limitations, ver:'1.0'});

    toast('<span class="big-score">+3점</span> 심사 통과! 『'+esc(d.title)+'』이(가) 서가에 등록됐어요 📗', 'score');
    earnBadge('firstPublish');
    onScore();
    document.getElementById('reg-done-actions').innerHTML =
      '<button class="btn btn-primary" onclick="state.regDraft={};nav(\'detail\','+newId+')">📗 서가에서 내 책 보기</button> '
      + '<button class="btn btn-ghost" onclick="state.regDraft={};nav(\'my\')">나의 서재</button>';
  }, 3600);
}

/* [고도화 4] 점수 마일스톤 링 (캐시워크식) */
const MILESTONES = [[50,'m50'],[100,'m100']];
let _msOff = 0, _msC = 0;
function milestoneRing(total){
  if(typeof total!=='number') total = state.ledger.reduce((s,l)=>s+l.pts,0);
  const done = total>=100;
  const next = total<50 ? 50 : 100;
  const prev = total<50 ? 0 : 50;
  const ratio = done ? 1 : Math.min(1,(total-prev)/(next-prev));
  const remain = done ? 0 : next-total;
  const r=52, C=2*Math.PI*r, off = C*(1-ratio);
  _msOff = off; _msC = C;
  return '<div class="card ms-ring-card">'
    + '<div class="ms-ring"><svg width="120" height="120" viewBox="0 0 120 120">'
    +   '<circle class="track" cx="60" cy="60" r="52"></circle>'
    +   '<circle class="prog" id="ms-prog" cx="60" cy="60" r="52" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+C.toFixed(1)+'"></circle>'
    + '</svg><div class="ctr"><span class="p">'+total+'</span><span class="u">누적 점수</span></div></div>'
    + '<div class="ms-info">'
    +   '<div class="big">'+(done ? '🏆 최고 마일스톤 달성!' : '🎯 다음 마일스톤 <b style="color:var(--gw-blue)">'+next+'점</b>까지 <b style="color:var(--gw-blue)">'+remain+'점</b>')+'</div>'
    +   '<div class="sub">'+(done
          ? '50·100점 보상을 모두 받았어요 — 내 어항에서 🐋🐉 를 확인해 보세요'
          : '50점·100점 도달 시 어항 물고기와 뱃지를 드려요 (캐시워크처럼 — 강제 아닌 기록, 점수는 상한·기록은 무제한)')+'</div>'
    +   '<div class="ms-milestones">'+MILESTONES.map(m=>'<span class="ms-flag'+(total>=m[0]?' hit':'')+'">'+(total>=m[0]?'✓ ':'')+m[0]+'점</span>').join('')+'</div>'
    + '</div></div>';
}
function animateRing(){ requestAnimationFrame(()=>{ const c=document.getElementById('ms-prog'); if(c){ void c.getBBox(); c.style.strokeDashoffset = _msOff; } }); }
function animateHbars(){ requestAnimationFrame(()=>{ document.querySelectorAll('.hbar-fill[data-w]').forEach(el=>{ el.style.width = el.getAttribute('data-w'); }); }); }
/* 점수 적립 시 호출 — 누적 재계산 → 마일스톤 판정 → 링 실시간 갱신 */
function onScore(){
  const total = state.ledger.reduce((s,l)=>s+l.pts,0);
  xlog('<span class="tbl">SCORE_LEDGER</span> 누적 합계 재계산 = <b>'+total+'점</b> <span class="arr">→</span> 마일스톤(50/100) 판정');
  MILESTONES.forEach(([th,key])=>{
    if(total>=th && state.badges[key] && !state.badges[key].earned){
      xlog('마일스톤 <b>'+th+'점</b> 도달 — 보상 지급: 어항 물고기 🐋 + 뱃지');
      earnBadge(key);

  if(host){ host.innerHTML = milestoneRing(total); animateRing(); }
}

const CAL_DOW = ['일','월','화','수','목','금','토'];
function renderCalendar(){
  const y = state.calYM.y, m = state.calYM.m;
  const first = new Date(y, m-1, 1).getDay();
  const days = new Date(y, m, 0).getDate();
  const canPrev = (m>6), canNext = (m<7);   /* 더미 데이터: 6월·7월만 */
  let g = '<div class="card cal-card"><div class="cal-head">'
    + '<button class="cal-nav" onclick="calNav(-1)" '+(canPrev?'':'disabled')+'>‹</button>'
    + '<span class="mtitle">'+y+'년 '+m+'월</span>'
    + '<button class="cal-nav" onclick="calNav(1)" '+(canNext?'':'disabled')+'>›</button>'
    + '<span style="margin-left:auto;font-size:.78rem;color:var(--ink-faint)">색 칩 = 그날의 책 · ★ = 내 별점(점수 무관)</span></div>'
    + '<div class="cal-grid">'
    + CAL_DOW.map((d,i)=>'<div class="cal-dow'+(i===0?' sun':'')+'">'+d+'</div>').join('');
  for(let i=0;i<first;i++) g += '<div class="cal-cell blank"></div>';
  for(let d=1; d<=days; d++){
    const key = y+'-'+m+'-'+d;
    const ev = CAL_EVENTS[key];
    const today = (y===2026 && m===7 && d===8);
    g += '<div class="cal-cell'+(today?' today':'')+'"><span class="dnum">'+d+'</span>'
      + (ev ? '<span class="cal-chip" style="background:'+ev.c+'" title="'+esc(ev.t)+'"><span class="ce">'+ev.ic+'</span>'+esc(ev.t)+'</span>'
              + (ev.s>0 ? '<span class="cal-stars">'+'★'.repeat(ev.s)+'</span>' : '') : '')
      + '</div>';
  }
  g += '</div><div class="cal-legend">이번 달 활용한 책 <b>'+Object.keys(CAL_EVENTS).filter(k=>k.startsWith(y+'-'+m+'-')).length+'권</b> · 꾸준히 읽을수록 달력이 채워져요 📚</div></div>';
  return g;
}
function calNav(dir){
  let m = state.calYM.m + dir;
  if(m<6) m=6; if(m>7) m=7;
  state.calYM.m = m;
  const host = document.getElementById('cal-host');
  if(host) host.innerHTML = renderCalendar();
  xlog('독서 캘린더 월 전환 → '+state.calYM.y+'-'+m+' · <span class="tbl">ASSET_USAGE_LOG</span>(user=me) 일자별 집계 (더미 2개월)');
}
function grassCells(){
  let cells = '';
  for(let w=0; w<26; w++){
    for(let d=0; d<7; d++){
      const r = ((w*7+d) * 2654435761) % 100;
      let lv = 0;
      if(r>88) lv=4; else if(r>72) lv=3; else if(r>52) lv=2; else if(r>30) lv=1;
      if(w<4 && r<85) lv=0; /* 초기엔 활동 적음 — 성장 서사 */
      cells += '<div class="gcell'+(lv?' g'+lv:'')+'" title="'+(lv*2)+'건 활동"></div>';
    }
  }
  return cells;
}

    }

      meta += w.pair ? '<span class="pair-tag">🤝 '+esc(w.pair.knowledge)+' × '+esc(w.pair.dev)+'</span>'

    }

    } else if(tab==='IN_PROGRESS'){

function sparkline(vals, w, h){
  const max=Math.max.apply(null,vals), min=Math.min.apply(null,vals);
  const pts = vals.map((v,i)=>{ const x=(i/(vals.length-1))*(w-6)+3; const y=h-((v-min)/((max-min)||1))*(h-8)-4; return x.toFixed(1)+','+y.toFixed(1); });
  const last = pts[pts.length-1].split(',');
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'
    + '<polyline points="'+pts.join(' ')+'" fill="none" stroke="var(--gw-blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>'
    + '<circle cx="'+last[0]+'" cy="'+last[1]+'" r="3.5" fill="var(--gw-blue)"></circle></svg>';
}

function startSim(){
  state.sim = {active:true, step:0};
  toggleXray(true);
  document.getElementById('sim-card').classList.add('visible');
  xlog('▶ 유스케이스 시뮬레이션 시작 — 페르소나: 박서연(인사팀, Light User). X-ray 자동 ON');

function simShow(){
  const s = SIM_STEPS[state.sim.step];
  document.getElementById('sim-stepnum').textContent = s.n;
  document.getElementById('sim-text').textContent = s.t;
  document.getElementById('sim-next').textContent = (state.sim.step===SIM_STEPS.length-1) ? '완주! 🎉' : '다음 →';

}

  if(state.sim.step >= SIM_STEPS.length-1){ endSim(true); return; }
  state.sim.step++;

}

  state.sim = {active:false, step:0};

  document.getElementById('sim-card').classList.remove('visible');

    toast('🎉 여정 완주 — 검색부터 어항까지, 비개발자의 5분이었습니다');

}

/* 등록·심사·배포 상태 연결 */
const TECH_QUEUE = [];
const PIPE_STEPS = ['Source Received','Dependency Scan','Security Scan','Docker Build','Test Deploy','Health Check','AX Review','Production Deploy'];

function statusLabel(rc){
  if(rc.status==='OPEN') return 'AX기획 심사 대기';
  if(rc.status==='TECH_WAIT') return 'AX개발 기술 검증 대기';
  if(rc.status==='PUBLISHED') return '공개 완료';
  if(rc.status==='REMAND') return '보완 요청';
  return rc.status;
}
function ensureTechItem(rc){
  let t=TECH_QUEUE.find(x=>x.rcId===rc.id);
  if(!t){
    t={id:'DEP-'+String(TECH_QUEUE.length+1).padStart(3,'0'),rcId:rc.id,title:rc.title,status:'WAITING',current:-1,
      steps:PIPE_STEPS.map(n=>({name:n,status:'WAIT'})),logs:['submission accepted · '+rc.id],draft:rc.draft||{}};
    TECH_QUEUE.push(t);
  }
  return t;
}

/* 기획 승인: 실행형 자산은 곧바로 공개하지 않고 개발팀 기술 검증으로 넘김 */
approveRC = function(id){
  const rc=REVIEW_QUEUE.find(r=>r.id===id);if(!rc)return;
  if(rc.requiresTech){
    rc.status='TECH_WAIT';
    ensureTechItem(rc);
    toast('✓ 업무·정책 심사 승인 — AX개발팀 기술 검증 큐로 이동했습니다');
  }else{
    rc.status='PUBLISHED';
    toast('✓ 승인 완료 — 검색 인덱스에 공개되었습니다','score');
  }
  renderAdmin('plan');
};

remandRC = function(id){
  const rc=REVIEW_QUEUE.find(r=>r.id===id);if(rc)rc.status='REMAND';
  toast('✉ 보완 요청을 등록자에게 보냈습니다');
  renderAdmin('plan');
};

function techQueueHTML(){
  if(!TECH_QUEUE.length) return '<div class="empty"><div class="big">🧑‍💻</div>기술 검증 대기 자산이 없습니다.<br>직원이 웹앱을 등록하고 AX기획팀이 승인하면 여기에 나타납니다.</div>';
  return TECH_QUEUE.map(t=>'<div class="card pipeline-wrap" id="tech-'+t.id+'"><div class="pipeline-head"><b>'+esc(t.title)+'</b><span class="pill">'+t.id+'</span><span class="status-chip '+(t.status==='PUBLISHED'?'verified':'')+'">'+(t.status==='PUBLISHED'?'공개 완료':t.status==='RUNNING'?'배포 진행 중':'기술 검증 대기')+'</span>'
    +'<span style="margin-left:auto">'+(t.status==='WAITING'?'<button class="btn btn-primary" onclick="runTechPipeline(\''+t.id+'\')">▶ 배포 파이프라인 실행</button>':t.status==='PUBLISHED'?'<button class="btn btn-secondary" onclick="toast(\'🔗 실행 URL: https://apps.daou.local/'+t.id.toLowerCase()+'\')">실행 URL 보기</button>':'')+'</span></div>'
    +'<div class="pipeline-steps">'+t.steps.map((p,i)=>'<div class="pipe-step '+(p.status==='DONE'?'done':p.status==='RUNNING'?'running':p.status==='FAIL'?'fail':'')+'"><span class="pno">'+(p.status==='DONE'?'✓':i+1)+'</span>'+p.name+'</div>').join('')+'</div>'
    +'<div class="tech-log">'+t.logs.map(l=>'› '+esc(l)).join('<br>')+'</div></div>').join('');
}
function runTechPipeline(id){
  const t=TECH_QUEUE.find(x=>x.id===id);if(!t||t.status==='RUNNING')return;
  t.status='RUNNING';t.current=-1;t.steps.forEach(p=>p.status='WAIT');t.logs=['pipeline started · '+new Date().toLocaleTimeString()];
  renderAdmin('dev');
  const next=()=>{
    if(t.current>=0){t.steps[t.current].status='DONE';t.logs.push(t.steps[t.current].name+' · PASS');}
    t.current++;
    if(t.current>=t.steps.length){
      t.status='PUBLISHED';
      publishTechAsset(t);
      renderAdmin('dev');
      return;
    }
    t.steps[t.current].status='RUNNING';
    t.logs.push(t.steps[t.current].name+' · RUNNING');
    renderAdmin('dev');
    setTimeout(next,520);
  };
  setTimeout(next,350);
}
function publishTechAsset(t){
  const rc=REVIEW_QUEUE.find(r=>r.id===t.rcId);if(rc)rc.status='PUBLISHED';

const V7_STORAGE_KEY = 'daou-ai-playground-v7';
const V7_VERSION = '7.0';

/* ---------- 사용자에게 보이는 용어만 플랫폼 언어로 정규화 ---------- */
function applyPlatformTerminology(root){
  root = root || document.body;
  const replacements = [
    ['AI 도서관','AI Playground'],
    ['희망도서','AI 제작 요청'],
    ['오케스트라','공동 제작'],
    ['사서 콘솔','AX 운영 콘솔'],
    ['사서가','AX 운영자가'],
    ['사서는','AX 운영자는'],
    ['사서의','AX 운영자의'],
    ['사서에게','AX 운영자에게'],
    ['대출(가져가기)','가져가기'],
    ['대출해서','가져가서'],
    ['대출됨','가져가기 발생'],
    ['대출함','가져감'],
    ['대출자','사용자'],
    ['대출순','가져가기순'],
    ['누적 대출','누적 가져가기'],
    ['총 대출','총 가져가기'],
    ['대출','가져가기'],
    ['출간하기','AI 자산 등록'],
    ['출원하기','등록 신청'],
    ['출원중','신청 접수'],
    ['출원','등록 신청'],
    ['출간됨','등록·공개 완료'],
    ['출간된','등록·공개된'],
    ['출간','등록·공개'],
    ['신간 서가','신규 자산'],
    ['신간','신규 자산'],
    ['전체 서가','전체 AI 자산'],
    ['서가로','자산 목록으로'],
    ['서가에','자산 목록에'],
    ['서가','자산 목록'],
    ['판권 정보','모델·운영 정보'],
    ['판권','모델·운영 정보'],
    ['파인튜닝','업무 맞춤 설정'],
    ['필사됨','따라 만든 횟수'],
    ['필사','따라 만들기'],
    ['나의 서재','내 자산함'],
    ['내 서재','내 자산함']
  ];
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);
  const nodes=[];
  while(walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(n=>{
    if(n.parentElement && n.parentElement.closest('.keep-metaphor')) return;
    let t=n.nodeValue;
    replacements.forEach(([a,b])=>{t=t.split(a).join(b);});
    if(t!==n.nodeValue)n.nodeValue=t;
  });
  root.querySelectorAll('[title]').forEach(el=>{
    if(el.closest('.keep-metaphor'))return;
    let t=el.getAttribute('title')||'';
    replacements.forEach(([a,b])=>{t=t.split(a).join(b);});
    el.setAttribute('title',t);
  });
}

/* ---------- persistence ---------- */
function serializableStateV7(){
  const copy=JSON.parse(JSON.stringify(state));
  copy.sim={active:false,step:0};
  copy.transcribe=null;
  return {
    version:V7_VERSION,
    savedAt:new Date().toISOString(),
    state:copy,
    assets:ASSETS,
    wishes:WISHES,
    reviews:REVIEW_QUEUE,
    radar:RADAR_POSTS,
    tech:TECH_QUEUE,
    ensembles:typeof ENSEMBLES!=='undefined'?ENSEMBLES:[],
    collabAudit:state.collabAudit||[]
  };
}
function savePersistentStateV7(showToast){
  try{
    localStorage.setItem(V7_STORAGE_KEY,JSON.stringify(serializableStateV7()));
    const b=document.getElementById('save-status-v7');
    if(b){b.textContent='✓';b.title='자동 저장 완료 · '+new Date().toLocaleTimeString();}
    if(showToast)toast('💾 현재 시연 상태를 저장했습니다');
  }catch(e){ if(showToast)toast('저장에 실패했습니다: '+e.message); }
}
function restoreArrayV7(target, source){
  if(!Array.isArray(source))return;
  target.splice(0,target.length,...source);
}
function loadPersistentStateV7(){
  try{
    const raw=localStorage.getItem(V7_STORAGE_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    if(d.state)Object.assign(state,d.state,{sim:{active:false,step:0},transcribe:null});
    restoreArrayV7(ASSETS,d.assets);
    restoreArrayV7(WISHES,d.wishes);
    restoreArrayV7(REVIEW_QUEUE,d.reviews);
    restoreArrayV7(RADAR_POSTS,d.radar);
    restoreArrayV7(TECH_QUEUE,d.tech);
    if(typeof ENSEMBLES!=='undefined')restoreArrayV7(ENSEMBLES,d.ensembles);
    state.collabAudit=d.collabAudit||[];
  }catch(e){console.warn('V7 restore failed',e);}
}
