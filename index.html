<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAOU AX — AI Playground</title>
<style>
html,body{margin:0;min-height:100%;background:#f3f5f8;font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
#app-loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#5a6472;font-size:14px}
</style>
</head>
<body>
<div id="app-loading">Playground를 불러오는 중입니다.</div>
<script>
(async function(){
  try{
    const response=await fetch('./app-base.html?v=20260714-3',{cache:'no-store'});
    if(!response.ok)throw new Error('HTTP '+response.status);
    let html=await response.text();
    html=html.replace('</body>','<script src="./ui-patch.js?v=20260714-3"><\/script><script src="./service-guide-patch.js?v=20260714-3"><\/script></body>');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.getElementById('app-loading').textContent='Playground를 불러오지 못했습니다. 페이지를 새로고침해 주세요.';
    console.error(error);
  }
})();
</script>
</body>
</html>
