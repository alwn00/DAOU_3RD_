function techQueueHTML(){
  if(!TECH_QUEUE.length)return '<div class="empty"><div class="big">🧑‍💻</div>기술 검증 대기 자산이 없습니다.</div>';
  return TECH_QUEUE.map(t=>{
    const cls=t.status==='FAILED'?'status-failed':t.status==='ROLLED_BACK'?'status-rolled':'status-chip '+(t.status==='PUBLISHED'?'verified':'');
    const label={WAITING:'기술 검증 대기',RUNNING:'배포 진행 중',FAILED:'검증 실패',PUBLISHED:'공개 완료',ROLLED_BACK:'롤백 완료'}[t.status]||t.status;
    let acts='';
    if(t.status==='WAITING')acts='<button class="btn btn-primary" onclick="runTechPipeline(\''+t.id+'\')">▶ 정상 배포</button><button class="btn btn-ghost" onclick="runTechPipeline(\''+t.id+'\',\'Health Check\')">⚠ 실패 시연</button>';
    else if(t.status==='FAILED')acts='<button class="btn btn-primary" onclick="retryTechPipelineV7(\''+t.id+'\')">↻ 수정 후 재실행</button><button class="btn btn-ghost" onclick="requestTechRevisionV7(\''+t.id+'\')">등록자 보완 요청</button>';
    else if(t.status==='PUBLISHED')acts='<button class="btn btn-secondary" onclick="openRuntimeByTechV7(\''+t.id+'\')">실행 URL</button><button class="btn btn-ghost" onclick="rollbackTechV7(\''+t.id+'\')">↩ 롤백</button>';
    else if(t.status==='ROLLED_BACK')acts='<button class="btn btn-primary" onclick="retryTechPipelineV7(\''+t.id+'\')">재배포</button>';
    return '<div class="card pipeline-wrap" id="tech-'+t.id+'"><div class="pipeline-head"><b>'+esc(t.title)+'</b><span class="pill">'+t.id+'</span><span class="'+cls+'">'+label+'</span><span class="pipe-actions">'+acts+'</span></div>'
      +'<div class="pipeline-steps">'+t.steps.map((p,i)=>'<div class="pipe-step '+(p.status==='DONE'?'done':p.status==='RUNNING'?'running':p.status==='FAIL'?'fail':'')+'"><span class="pno">'+(p.status==='DONE'?'✓':p.status==='FAIL'?'!':i+1)+'</span>'+p.name+'</div>').join('')+'</div>'
      +'<div class="tech-log">'+t.logs.map(l=>'› '+esc(l)).join('<br>')+'</div></div>';
  }).join('');
}
runTechPipeline=function(id,failAt){
  const t=TECH_QUEUE.find(x=>x.id===id);if(!t||t.status==='RUNNING')return;
  t.status='RUNNING';t.current=-1;t.steps.forEach(p=>p.status='WAIT');t.logs=['pipeline started · '+new Date().toLocaleTimeString()];
  savePersistentStateV7(false);renderAdmin('dev');
  const next=()=>{
    if(t.current>=0){
      const current=t.steps[t.current];
      if(failAt&&current.name===failAt){
        current.status='FAIL';t.status='FAILED';t.logs.push(current.name+' · FAIL · health endpoint timeout');
        const rc=REVIEW_QUEUE.find(r=>r.id===t.rcId);if(rc)rc.status='TECH_REMAND';
        savePersistentStateV7(false);renderAdmin('dev');toast('⚠ '+current.name+' 실패 — 등록자 보완 또는 재실행이 필요합니다');return;
      }
      current.status='DONE';t.logs.push(current.name+' · PASS');
    }
    t.current++;
    if(t.current>=t.steps.length){t.status='PUBLISHED';publishTechAsset(t);savePersistentStateV7(false);renderAdmin('dev');return;}
    t.steps[t.current].status='RUNNING';t.logs.push(t.steps[t.current].name+' · RUNNING');savePersistentStateV7(false);renderAdmin('dev');setTimeout(next,420);
  };
  setTimeout(next,250);
}
function retryTechPipelineV7(id){
  const t=TECH_QUEUE.find(x=>x.id===id);if(!t)return;
  t.status='WAITING';t.current=-1;t.steps.forEach(p=>p.status='WAIT');t.logs.push('configuration fixed · retry requested');
  const rc=REVIEW_QUEUE.find(r=>r.id===t.rcId);if(rc)rc.status='TECH_WAIT';
  savePersistentStateV7(false);renderAdmin('dev');toast('↻ 보완 반영 후 재실행할 수 있습니다');
}
function requestTechRevisionV7(id){
  const t=TECH_QUEUE.find(x=>x.id===id),rc=t&&REVIEW_QUEUE.find(r=>r.id===t.rcId);if(rc)rc.status='REMAND';
  savePersistentStateV7(false);renderAdmin('dev');toast('✉ 등록자에게 기술 보완 요청을 보냈습니다');
}
function rollbackTechV7(id){
  const t=TECH_QUEUE.find(x=>x.id===id);if(!t)return;
  t.status='ROLLED_BACK';t.logs.push('rollback to previous stable version · SUCCESS');
  const rc=REVIEW_QUEUE.find(r=>r.id===t.rcId);if(rc)rc.status='SUSPENDED';
  const a=ASSETS.find(a=>a.title===t.title);if(a){a.suspended=true;a.runtimeStatus='ROLLED_BACK';}
  savePersistentStateV7(false);renderAdmin('dev');toast('↩ 이전 안정 버전으로 롤백하고 신규 버전을 중지했습니다');
}

function cleanAssetTextV10(text){
  return String(text||'')
    .replaceAll('나의 서재','내 자산함')
    .replaceAll('내 서재','내 자산함')
    .replaceAll('빌린 책','가져온 자산')
    .replaceAll('낸 책','내가 만든 자산')
    .replaceAll('책장','자산 보관함')
    .replaceAll('독서 캘린더','활동 캘린더')
    .replaceAll('독서달력','활동 달력')
    .replaceAll('서평','사용 후기')
    .replaceAll('대출됨','사용됨')
    .replaceAll('대출함','가져옴')
    .replaceAll('대출','가져오기')
    .replaceAll('출간됨','등록·공개 완료')
    .replaceAll('출간','등록·공개')
    .replaceAll('출원','등록 신청')
    .replaceAll('희망도서','AI 제작 요청')
    .replaceAll('사서','AX 운영자')
    .replaceAll('작가','제작자')
    .replaceAll('독자','사용자')
    .replaceAll('필사','따라 만들기')
    .replaceAll('서가','AI 자산 목록')
    .replaceAll('책','자산')
    .replace(/(\d+)권/g,'$1개');
}

function radarPersonV10(p){
  const raw=(p.by||'DAOU 직원').split('·');
  const name=(raw[0]||'DAOU 직원').trim();
  const dept=(raw[1]||'다우기술').trim();
  const handle='@'+dept.replace(/[^a-zA-Z0-9가-힣]/g,'').slice(0,12);
  const avatars=['🧑‍💻','👩‍💼','🧑‍🔬','👨‍💼','👩‍💻'];
  let sum=0;for(const ch of name)sum+=ch.charCodeAt(0);
  return {name,dept,handle,avatar:avatars[sum%avatars.length]};
}
function radarDomainV10(url){
  try{return new URL(url).hostname.replace('www.','');}catch(e){return '첨부 링크';}
}
function radarFilteredV10(){
  let list=[...RADAR_POSTS];
  if(state.radarTab==='verified')list=list.filter(p=>p.verified);
  if(state.radarTab==='poc')list=list.filter(p=>p.poc);
  if(state.radarTab==='popular')list.sort((a,b)=>(b.likes+b.reposts+(b.commentList||[]).length*2)-(a.likes+a.reposts+(a.commentList||[]).length*2));
  return list;
}

}

  savePersistentStateV7(false);render트렌드();
}

   ============================================================ */
state.trendQuery=state.trendQuery||'';

function anonIdentityV11(p){
  if(p.anonId)return p.anonId;
  let seed=0;
  const base=(p.by||'익명')+(p.id||'');
  for(const ch of base)seed=(seed*31+ch.charCodeAt(0))%10000;
  p.anonId='익명 '+String(seed).padStart(4,'0');
  p.anonHandle='@anonymous_'+String(seed).padStart(4,'0');
  return p.anonId;
}
RADAR_POSTS.forEach(p=>anonIdentityV11(p));

function trendFilteredV11(){
  let list=[...RADAR_POSTS];
  if(state.radarTab==='latest')list.sort((a,b)=>0);
  if(state.radarTab==='popular')list.sort((a,b)=>(b.likes+b.reposts+(b.commentList||[]).length*2)-(a.likes+a.reposts+(a.commentList||[]).length*2));
  if(state.radarTab==='verified')list=list.filter(p=>p.verified);
  const q=(state.trendQuery||'').trim().toLowerCase();
  if(q){
    list=list.filter(p=>
      (p.title||'').toLowerCase().includes(q)||
      (p.body||'').toLowerCase().includes(q)||
      (p.tags||[]).join(' ').toLowerCase().includes(q)||
      (p.anonId||'').toLowerCase().includes(q)
    );
  }
  return list;
}
function setTrendQueryV11(v){
  state.trendQuery=v;
  renderRadar();
  savePersistentStateV7(false);
}
function trendMediaV11(p,idx){
  if(p.imageUrl){
    return '<div class="trend-media"><img src="'+esc(p.imageUrl)+'" alt="" style="width:100%;display:block"></div>';
  }
  if(idx===0){
    return '<div class="trend-media mock-image"><span class="trend-media-label">AI 기술·도구 관계망 시각화 예시</span></div>';
  }
  if(p.sourceUrl){
    return '<div class="trend-link-card" onclick="toast(\'출처 링크: '+esc(radarDomainV10(p.sourceUrl))+'\')"><div class="trend-link-preview"><div class="trend-link-icon">🔗</div><div><div class="trend-link-title">'+esc(p.title)+'</div><div class="trend-link-domain">'+esc(radarDomainV10(p.sourceUrl))+'</div></div></div></div>';
  }
  return '';
}
function openAnonProfileV11(id){
  const p=RADAR_POSTS.find(x=>x.id===id);if(!p)return;
  const anon=anonIdentityV11(p);
  const posts=RADAR_POSTS.filter(x=>anonIdentityV11(x)===anon);
  openModal('<h3>'+esc(anon)+'</h3><div class="desc">익명 사용자의 공개 스레드 활동만 확인할 수 있습니다. 실명·부서 정보는 노출하지 않습니다.</div>'
    +'<div class="anon-profile-list">'+posts.map(x=>'<div class="anon-profile-post"><b>'+esc(x.title)+'</b><div style="font-size:.78rem;color:var(--ink-soft);margin-top:4px">'+esc(x.body).slice(0,120)+'</div></div>').join('')+'</div>'
    +'<div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">닫기</button></div>');
}
function openTrendWriteV11(){
  openModal('<h3>새 스레드 작성</h3><div class="desc">실명과 부서는 노출되지 않으며 익명 닉네임으로 게시됩니다. 편하게 경험과 의견을 공유해 주세요.</div>'
    +'<div class="formrow"><div class="lb">본문</div><textarea id="trend-body-v11" rows="6" placeholder="새로 발견한 AI 기능, 업무에 써본 경험, 궁금한 점을 자유롭게 적어 주세요."></textarea></div>'
    +'<div class="formrow"><div class="lb">링크 <span class="hint">선택</span></div><input id="trend-source-v11" type="text" placeholder="https://"></div>'
    +'<div class="formrow"><div class="lb">태그</div><input id="trend-tags-v11" type="text" placeholder="예: Claude, Copilot, 업무자동화"></div>'
    +'<div class="modal-actions"><button class="btn btn-primary" onclick="submitTrendPostV11()">익명으로 게시</button><button class="btn btn-ghost" onclick="closeModal()">취소</button></div>');
}
function submitTrendPostV11(){
  const body=(document.getElementById('trend-body-v11')||{}).value?.trim();
  const sourceUrl=(document.getElementById('trend-source-v11')||{}).value?.trim();
  const tagsRaw=(document.getElementById('trend-tags-v11')||{}).value||'';
  if(!body)return;
  const p={id:'TR-'+Date.now(),title:body.split('\n')[0].slice(0,45),body,sourceUrl,
    by:'anonymous',ago:'방금',tags:tagsRaw.split(',').map(x=>x.trim()).filter(Boolean),
    verified:false,poc:false,commentList:[],suggestions:[],reports:0,likes:0,reposts:0,liked:false,reposted:false};
  anonIdentityV11(p);RADAR_POSTS.unshift(p);
  closeModal();state.radarTab='latest';savePersistentStateV7(false);renderRadar();toast('익명 스레드가 게시되었습니다');
}
renderRadar=function(){
  if(!state.radarTab||state.radarTab==='poc')state.radarTab='popular';
  const list=trendFilteredV11();
  const canCurate=state.actor==='plan';

  document.getElementById('screen-radar').innerHTML=
    '<div class="trend-shell">'
    +'<div class="trend-toolbar"><h2>AI 트렌드</h2><div class="trend-search"><span>⌕</span><input value="'+esc(state.trendQuery||'')+'" oninput="setTrendQueryV11(this.value)" placeholder="스레드, 태그, 익명 닉네임 검색"></div>'
    +'<button class="trend-write-btn" onclick="openTrendWriteV11()">새 스레드</button></div>'
    +'<nav class="trend-tabs">'+[['popular','추천'],['latest','최신'],['verified','확인된 정보']].map(t=>'<button class="'+(state.radarTab===t[0]?'active':'')+'" onclick="setRadarTab(\''+t[0]+'\')">'+t[1]+'</button>').join('')+'</nav>'
    +'<div class="trend-composer" onclick="openTrendWriteV11()"><div class="trend-composer-avatar">익</div><div class="trend-composer-placeholder">AI에 대해 자유롭게 이야기해 보세요.</div></div>'
    +'<main class="trend-feed">'+(list.length?list.map((p,idx)=>{
      const anon=anonIdentityV11(p);
      const comments=p.commentList||[];
      const suggestions=p.suggestions||[];
      return '<article class="trend-post"><div class="trend-avatar-col"><div class="trend-avatar">익</div>'+(idx<list.length-1?'<div class="trend-thread-line"></div>':'')+'</div>'
        +'<div class="trend-content"><div class="trend-head"><span class="trend-author" onclick="openAnonProfileV11(\''+p.id+'\')">'+esc(anon)+'</span>'
        +(p.verified?'<span class="thread-verified">●</span>':'')+'<span class="trend-anon-handle">'+esc(p.anonHandle)+'</span><span class="trend-time">· '+esc(p.ago)+'</span>'
        +'<button class="trend-more">•••</button></div>'
        +'<div class="trend-text">'+esc(p.body)+'</div>'
        +trendMediaV11(p,idx)
        +'<div class="trend-tags">'+(p.tags||[]).map(t=>'<span class="trend-tag">#'+esc(t)+'</span>').join('')+'</div>'
        +'<div class="trend-actions"><button class="trend-action '+(p.liked?'on':'')+'" onclick="toggleRadarLikeV10(\''+p.id+'\')">♡ <span>'+p.likes+'</span></button>'
        +'<button class="trend-action" onclick="openRadarCommentV7(\''+p.id+'\')">◯ <span>'+comments.length+'</span></button>'
        +'<button class="trend-action '+(p.reposted?'on':'')+'" onclick="toggleRadarRepostV10(\''+p.id+'\')">↻ <span>'+p.reposts+'</span></button>'
        +'<button class="trend-action" onclick="toast(\'스레드 링크를 복사했습니다\')">⌁ 공유</button>'
        +'<button class="trend-action" onclick="openRadarSuggestV7(\''+p.id+'\')">수정 제안</button>'
        +'<button class="trend-action" onclick="reportRadarV7(\''+p.id+'\')">신고</button></div>'
        +(comments.length||suggestions.length?'<div class="trend-replies">'
          +comments.slice(0,3).map(c=>'<div class="trend-reply"><div class="trend-reply-avatar">익</div><div class="trend-reply-body"><b>'+esc((c.anonId||'익명 답글'))+'</b> '+esc(c.text)+'</div></div>').join('')
          +suggestions.slice(0,1).map(s=>'<div class="trend-suggestion"><b>수정 제안</b><br>'+esc(s.text)+'</div>').join('')+'</div>':'')
        +(canCurate?'<div class="trend-admin-actions"><button class="btn btn-ghost" onclick="toggleRadarVerify(\''+p.id+'\')">'+(p.verified?'확인 해제':'정보 확인')+'</button>'
          +'<button class="btn btn-ghost" onclick="toggleRadarPoc(\''+p.id+'\')">내부 PoC 후보 지정</button>'
          +'<button class="btn btn-ghost" onclick="convertRadarV7(\''+p.id+'\',\'ASSET\')">AI 자산 전환</button>'
          +'<button class="btn btn-ghost" onclick="convertRadarV7(\''+p.id+'\',\'EDUCATION\')">교육 전환</button></div>':'')
        +'</div></article>';
    }).join(''):'<div class="trend-empty">검색 결과가 없습니다.</div>')+'</main></div>';
};
function submitRadarCommentV7(id){
  const p=RADAR_POSTS.find(x=>x.id===id),el=document.getElementById('radar-comment-input');
  if(!p||!el||!el.value.trim())return;
  let seed=(Date.now()%10000);
  p.commentList.push({by:'anonymous',anonId:'익명 '+String(seed).padStart(4,'0'),text:el.value.trim(),at:'방금'});
  p.comments=p.commentList.length;savePersistentStateV7(false);closeModal();renderRadar();toast('익명 답글이 등록되었습니다');
}
openRadarWriteV7=openTrendWriteV11;


/* ============================================================
   INIT
   ============================================================ */
switchActor(state.actor||'user', true);
nav(state.screen&&state.screen!=='detail'?state.screen:'home');
</script>
</body>
</html>
